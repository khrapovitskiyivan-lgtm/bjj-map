    <style>
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background-color: #f1f5f9; 
            color: #1e293b; 
            margin: 0;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        body.dark {
            background-color: #0f172a;
            color: #e2e8f0;
        }
        
        #mynetwork { 
            width: 100%; 
            height: 60vh; 
            min-height: 400px; 
            background: white; 
            border-radius: 16px; 
            border: 1px solid #e2e8f0;
            touch-action: none;
        }
        
        body.dark #mynetwork {
            background: #1e293b;
            border-color: #334155;
        }
        
        .node-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .filter-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
        .progress-btn { transition: all 0.2s; }
        .progress-btn.active-not { background: #e2e8f0; color: #475569; border: 1px solid #cbd5e1; }
        .progress-btn.active-progress { background: #fef3c7; color: #b45309; border: 1px solid #fcd34d; }
        .progress-btn.active-done { background: #d1fae5; color: #047857; border: 1px solid #6ee7b7; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
        
        body.dark ::-webkit-scrollbar-track { background: #1e293b; }
        body.dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        .rule-btn.active-rule { background: #0f172a; color: white; border-color: #0f172a; }
        body.dark .rule-btn.active-rule { background: #3b82f6; border-color: #3b82f6; }
        
        .style-highlight { border: 2px solid #f59e0b; }
        
        .bottom-sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 998;
        }
        
        .bottom-sheet-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.15);
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 999;
            max-height: 85vh;
            overflow-y: auto;
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }
        
        body.dark .bottom-sheet {
            background: #1e293b;
        }
        
        .bottom-sheet.active {
            transform: translateY(0);
        }
        
        .bottom-sheet-handle {
            width: 40px;
            height: 4px;
            background: #cbd5e0;
            border-radius: 2px;
            margin: 12px auto;
            cursor: grab;
        }
        
        body.dark .bottom-sheet-handle {
            background: #475569;
        }
        
        .bottom-sheet-content {
            padding: 0 20px 20px;
        }
        
        .context-menu {
            position: absolute;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            z-index: 1000;
            min-width: 200px;
            animation: contextMenuAppear 0.2s ease-out;
        }
        
        body.dark .context-menu {
            background: #1e293b;
        }
        
        @keyframes contextMenuAppear {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .context-menu button {
            display: block;
            width: 100%;
            padding: 14px 16px;
            border: none;
            background: none;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            min-height: 48px;
            color: #1e293b;
        }
        
        body.dark .context-menu button {
            color: #e2e8f0;
        }
        
        .context-menu button:active {
            background: #f1f5f9;
        }
        
        body.dark .context-menu button:active {
            background: #334155;
        }
        
        body.dark header {
            background: #1e293b;
            border-color: #334155;
        }
        
        body.dark .bg-white {
            background: #1e293b;
        }
        
        body.dark .bg-slate-100 {
            background: #334155;
        }
        
        body.dark .bg-slate-50 {
            background: #334155;
        }
        
        body.dark .text-slate-800 {
            color: #e2e8f0;
        }
        
        body.dark .text-slate-700 {
            color: #cbd5e1;
        }
        
        body.dark .text-slate-600 {
            color: #94a3b8;
        }
        
        body.dark .text-slate-500 {
            color: #64748b;
        }
        
        body.dark .border-slate-200 {
            border-color: #334155;
        }
        
        body.dark .border-slate-300 {
            border-color: #475569;
        }
        
        body.dark input {
            background: #334155;
            border-color: #475569;
            color: #e2e8f0;
        }
        
        body.dark input::placeholder {
            color: #64748b;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

            </div>
        </div>

        <div class="flex gap-2 overflow-x-auto pb-1 mb-2">

            <button class="rule-btn whitespace-nowrap px-2 py-1 rounded-full bg-white border border-slate-300 text-xs font-medium" data-rule="ibjjf_nogi">IBJJF No‑Gi</button>

        <div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar">

            <button class="filter-btn whitespace-nowrap px-3 py-1.5 rounded-full bg-white border border-slate-300 text-slate-700 font-medium text-sm" data-filter="transition">Переходы</button>

            },
            physics: { 
                solver: 'forceAtlas2Based', 
                forceAtlas2Based: { gravitationalConstant: -50 },
                stabilization: { iterations: 150 }
            },
            interaction: { 
                hover: true,
                dragNodes: true,
                dragView: true,
                zoomView: true,
                navigationButtons: false,
                keyboard: false
            }
        });

        // ================== PROGRESS ==================
        const STORAGE_KEY = 'bjj_learned_v3';
        let progress = {};
        
        const getProgress = () => progress;
        
        const setProgress = async (id, status) => { 
            progress[id] = status; 
            localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
            await syncProgressToServer(progress);
            updateGlobalProgress(); 
            updateNodeColors(); 
            triggerHaptic('light'); 
        };

        async function initProgress() {
            const serverProgress = await loadProgressFromServer();
            if (serverProgress) {
                progress = serverProgress;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
            } else {
                progress = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            }
            updateGlobalProgress();
            updateNodeColors();
        }

        function updateNodeColors() {
            const learnedSet = new Set(Object.keys(progress).filter(id => progress[id] === 'done'));
            const availableSet = new Set();
            edges.forEach(edge => {
                if (learnedSet.has(String(edge.from)) && !learnedSet.has(String(edge.to))) availableSet.add(edge.to);
                if (learnedSet.has(String(edge.to)) && !learnedSet.has(String(edge.from))) availableSet.add(edge.from);
            });
            nodes.forEach(node => {
                const status = progress[node.id] || 'not_started';
                let color;
                if (status === 'done') color = { background: '#4CAF50', border: '#2E7D32' };
                else if (status === 'in_progress') color = { background: '#f59e0b', border: '#d97706' };
                else if (availableSet.has(node.id)) color = { background: '#FFC107', border: '#FF9800' };
                else { 
                    const orig = groups[node.group]?.color?.background || '#ccc'; 
                    color = { background: orig, opacity: 0.6 }; 
                }
                nodes.update({ id: node.id, color });
            });
        }

        function updateGlobalProgress() {
            const total = bjjNodesData.length;
            const done = Object.values(progress).filter(v => v === 'done').length;
            const percent = Math.round((done / total) * 100);
            document.getElementById('globalProgressText').textContent = `${percent}%`;
            document.getElementById('progressBar').style.width = `${percent}%`;
        }

        // ================== BOTTOM SHEET ==================
        class BottomSheet {
            constructor() {
                this.sheet = document.getElementById('bottomSheet');
                this.content = document.getElementById('nodeDetails');
                this.overlay = document.getElementById('bottomSheetOverlay');
                this.handle = document.getElementById('bottomSheetHandle');
                this.startY = 0;
                this.isDragging = false;

                this.handle.addEventListener('touchstart', (e) => this.startDrag(e));
                document.addEventListener('touchmove', (e) => this.onDrag(e));
                document.addEventListener('touchend', () => this.endDrag());
                this.overlay.addEventListener('click', () => this.hide());
            }

            show() {
                this.sheet.classList.add('active');
                this.overlay.classList.add('active');
                triggerHaptic('medium');
            }

            hide() {
                this.sheet.classList.remove('active');
                this.overlay.classList.remove('active');
                this.sheet.style.transform = '';
                triggerHaptic('light');
            }

            startDrag(e) {
                this.startY = e.touches[0].clientY;
                this.isDragging = true;
            }

            onDrag(e) {
                if (!this.isDragging) return;
                const diff = e.touches[0].clientY - this.startY;
                if (diff > 0) {
                    this.sheet.style.transform = `translateY(${diff}px)`;
                }
            }

            endDrag() {
                if (!this.isDragging) return;
                this.isDragging = false;
                const currentTransform = this.sheet.style.transform;
                const diff = currentTransform ? parseInt(currentTransform.replace('translateY(', '').replace('px)', '')) : 0;
                
                if (diff > 100) {
                    this.hide();
                } else {
                    this.sheet.style.transform = '';
                }
            }
        }

        const bottomSheet = new BottomSheet();

        // ================== GI / NO‑GI TOGGLE ==================
        let giFilterState = 'gi';
        const giToggleBtn = document.getElementById('giToggleBtn');
        function updateGiButtonUI() {
            if (giFilterState === 'gi') {
                giToggleBtn.textContent = 'Gi';
                giToggleBtn.classList.add('active');
            } else {
                giToggleBtn.textContent = 'No‑Gi';
                giToggleBtn.classList.remove('active');
            }
        }
        window.toggleGiFilter = () => {
            giFilterState = giFilterState === 'gi' ? 'nogi' : 'gi';
            updateGiButtonUI();
            applyAllFilters();
            triggerHaptic('light');
        };

        // ================== FILTERS ==================
        let currentCategoryFilter = null;
        let currentRule = 'none';
        let styleFilterActive = false;
        let styleProfile = JSON.parse(localStorage.getItem('bjj_style_profile') || '{}');

        function applyAllFilters() {
            nodes.forEach(n => nodes.update({ id: n.id, hidden: true }));
            nodes.forEach(n => {
                const passCategory = (currentCategoryFilter === null || n.group === currentCategoryFilter);
                if (!passCategory) return;
                const passGi = (giFilterState === 'gi' && n.gi) || (giFilterState === 'nogi' && n.noGi);
                if (!passGi) return;
                let passRule = true;
                if (currentRule === 'ibjjf_gi') passRule = n.legal_ibjjf_gi;
                else if (currentRule === 'ibjjf_nogi') passRule = n.legal_ibjjf_nogi;
                else if (currentRule === 'adcc') passRule = n.legal_adcc;
                if (!passRule) {
                    nodes.update({ id: n.id, hidden: false, opacity: 0.4 });
                    return;
                }
                nodes.update({ id: n.id, hidden: false, opacity: 1.0 });
            });
            if (styleFilterActive && Object.keys(styleProfile).length > 0) {
                nodes.forEach(n => {
                    if (n.hidden) return;
                    const tags = n.tags || [];
                    const matches = tags.some(tag => styleProfile[tag]);
                    if (matches) {
                        nodes.update({ id: n.id, borderWidth: 2, borderColor: '#f59e0b' });
                    } else {
                        nodes.update({ id: n.id, borderWidth: undefined, borderColor: undefined });
                    }
                });
            } else {
                nodes.forEach(n => nodes.update({ id: n.id, borderWidth: undefined, borderColor: undefined }));
            }

            edges.forEach(e => {
                const from = nodes.get(e.from);
                const to = nodes.get(e.to);
                if (from && to) edges.update({ id: e.id, hidden: from.hidden || to.hidden });
            });
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            if (btn.id === 'styleFilterBtn') return;
            btn.addEventListener('click', function() {
                const filterValue = this.dataset.filter;
                if (this.classList.contains('active') && currentCategoryFilter === filterValue) {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    currentCategoryFilter = null;
                } else {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentCategoryFilter = filterValue;
                }
                applyAllFilters();
                triggerHaptic('light');
            });
        });

        document.querySelectorAll('.rule-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.rule-btn').forEach(b => b.classList.remove('active-rule'));
                this.classList.add('active-rule');
                currentRule = this.dataset.rule;
                applyAllFilters();
                triggerHaptic('light');
            });
        });

        window.toggleStyleFilter = () => {
            const btn = document.getElementById('styleFilterBtn');
            if (Object.keys(styleProfile).length === 0) {
                alert('Сначала заполните анкету стиля (кнопка "Стиль" вверху).');
                return;
            }
            styleFilterActive = !styleFilterActive;
            if (styleFilterActive) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
            applyAllFilters();
            triggerHaptic('light');
        };

        window.openStyleModal = () => {
            document.getElementById('styleModal').classList.remove('hidden');
            document.getElementById('styleFlex').checked = !!styleProfile.flexibility;
            document.getElementById('stylePressure').checked = !!styleProfile.pressure;
            document.getElementById('styleLong').checked = !!styleProfile.long_limbs;
            document.getElementById('styleSpeed').checked = !!styleProfile.speed;
        };
        window.closeStyleModal = () => document.getElementById('styleModal').classList.add('hidden');
        window.saveStyleProfile = () => {
            styleProfile = {
                flexibility: document.getElementById('styleFlex').checked,
                pressure: document.getElementById('stylePressure').checked,
                long_limbs: document.getElementById('styleLong').checked,
                speed: document.getElementById('styleSpeed').checked
            };
            localStorage.setItem('bjj_style_profile', JSON.stringify(styleProfile));
            closeStyleModal();
            if (styleFilterActive) applyAllFilters();
            triggerHaptic('medium');
        };

        // ================== DETAILS CARD ==================
        function renderNodeDetails(nodeId) {
            const nodeData = bjjNodesData.find(n => n.id === nodeId);
            if (!nodeData) return;
            const currentStatus = progress[nodeId] || 'not_started';
            const categoryLabels = { position:'Позиция', submission:'Сабмишен', sweep:'Свип', guard_pass:'Проход', transition:'Переход', escape:'Защита', takedown:'Тейкдаун' };
            const beltIcons = { white:'⚪', blue:'🔵', purple:'🟣', brown:'🟤', black:'⚫' };
            const badges = [];
            if (nodeData.gi) badges.push('<span class="px-2 py-0.5 bg-indigo-50 text-indigo-600 rounded text-xs border border-indigo-200">🥋 Gi</span>');
            if (nodeData.noGi) badges.push('<span class="px-2 py-0.5 bg-cyan-50 text-cyan-600 rounded text-xs border border-cyan-200">🩳 No‑Gi</span>');
            const legalIcons = [];
            legalIcons.push(nodeData.legal_ibjjf_gi ? '✅ IBJJF Gi' : '🚫 IBJJF Gi');
            legalIcons.push(nodeData.legal_ibjjf_nogi ? '✅ IBJJF No‑Gi' : '🚫 IBJJF No‑Gi');
            legalIcons.push(nodeData.legal_adcc ? '✅ ADCC' : '🚫 ADCC');
            const pointsText = nodeData.points > 0 ? `⭐ ${nodeData.points} очк.` : '';
            const tagIcons = [];
            if (nodeData.tags.includes('flexibility')) tagIcons.push('🧘');
            if (nodeData.tags.includes('pressure')) tagIcons.push('🦍');
            if (nodeData.tags.includes('long_limbs')) tagIcons.push('🕷️');
            if (nodeData.tags.includes('speed')) tagIcons.push('⚡');

            const linkedEdges = bjjEdgesData.filter(e => e.from === nodeId || e.to === nodeId);
            const triggerGroups = {};
            const noTrigger = [];
            linkedEdges.forEach(edge => {
                const relatedId = edge.from === nodeId ? edge.to : edge.from;
                const relatedNode = bjjNodesData.find(n => n.id === relatedId);
                const direction = edge.from === nodeId ? '→' : '←';
                const item = { relatedId, relatedNode, direction };
                if (edge.trigger) {
                    if (!triggerGroups[edge.trigger]) triggerGroups[edge.trigger] = [];
                    triggerGroups[edge.trigger].push(item);
                } else {
                    noTrigger.push(item);
                }
            });

            let linkedHtml = '';
            for (const [trigger, items] of Object.entries(triggerGroups)) {
                linkedHtml += `<div class="mb-2"><span class="text-xs font-semibold text-slate-500">${trigger}</span>`;
                items.forEach(item => {
                    linkedHtml += `<button onclick="focusNode(${item.relatedId})" class="flex items-center gap-2 w-full text-left px-3 py-1 bg-slate-50 hover:bg-slate-100 rounded-lg transition text-sm border border-slate-100"><span class="text-slate-400">${item.direction}</span><span class="font-medium text-slate-700">${item.relatedNode ? item.relatedNode.label : item.relatedId}</span></button>`;
                });
                linkedHtml += `</div>`;
            }
            if (noTrigger.length > 0) {
                linkedHtml += `<div class="mb-2"><span class="text-xs font-semibold text-slate-500">Всегда доступно</span>`;
                noTrigger.forEach(item => {
                    linkedHtml += `<button onclick="focusNode(${item.relatedId})" class="flex items-center gap-2 w-full text-left px-3 py-1 bg-slate-50 hover:bg-slate-100 rounded-lg transition text-sm border border-slate-100"><span class="text-slate-400">${item.direction}</span><span class="font-medium text-slate-700">${item.relatedNode ? item.relatedNode.label : item.relatedId}</span></button>`;
                });
                linkedHtml += `</div>`;
            }

            document.getElementById('nodeDetails').innerHTML = `
                <div class="fade-in">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <h2 class="text-lg font-bold text-slate-800 mb-1">${nodeData.title}</h2>
                            <div class="flex gap-2 flex-wrap">
                                <span class="px-2 py-0.5 bg-slate-100 rounded text-xs text-slate-600 border border-slate-200">${categoryLabels[nodeData.group]}</span>
                                <span class="px-2 py-0.5 bg-slate-100 rounded text-xs text-slate-600 border border-slate-200">${beltIcons[nodeData.belt]} ${nodeData.belt}</span>
                                ${badges.join('')}
                                ${pointsText ? `<span class="px-2 py-0.5 bg-yellow-50 text-yellow-700 rounded text-xs border border-yellow-200">${pointsText}</span>` : ''}
                            </div>
                            <div class="text-xs text-slate-500 mt-1 space-x-2">${legalIcons.join(' · ')}</div>
                            ${tagIcons.length ? `<div class="text-xs mt-1">${tagIcons.join(' ')}</div>` : ''}
                        </div>
                        <button onclick="shareNode(${nodeId})" class="p-2 bg-slate-100 rounded-lg hover:bg-slate-200 transition text-slate-500"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></button>
                    </div>
                    <p class="text-slate-600 text-sm mb-4 leading-relaxed">${nodeData.desc}</p>
                    <div class="mb-4">
                        <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Прогресс</h3>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="updateProgress(${nodeId}, 'not_started')" class="progress-btn ${currentStatus==='not_started'?'active-not':'bg-slate-50 text-slate-500 border border-slate-200'} py-2 rounded-lg text-xs font-medium">Не начал</button>
                            <button onclick="updateProgress(${nodeId}, 'in_progress')" class="progress-btn ${currentStatus==='in_progress'?'active-progress':'bg-slate-50 text-slate-500 border border-slate-200'} py-2 rounded-lg text-xs font-medium">В процессе</button>
                            <button onclick="updateProgress(${nodeId}, 'done')" class="progress-btn ${currentStatus==='done'?'active-done':'bg-slate-50 text-slate-500 border border-slate-200'} py-2 rounded-lg text-xs font-medium">Изучено</button>
                        </div>
                    </div>
                    ${linkedHtml ? `<div class="border-t border-slate-200 pt-3"><h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Реакции и продолжения</h3><div class="flex flex-col gap-1 max-h-40 overflow-y-auto">${linkedHtml}</div></div>` : ''}
                </div>`;
            
            bottomSheet.show();
        }

        window.updateProgress = async (id, status) => { 
            await setProgress(id, status); 
            renderNodeDetails(id); 
        };
        window.focusNode = (id) => { 
            network.focus(id, { scale: 1.8, animation: true }); 
            setTimeout(() => { 
                network.selectNodes([id]); 
                renderNodeDetails(id); 
            }, 300); 
        };
        window.fitGraph = () => { network.fit({ animation: true }); };
        window.shareNode = (nodeId) => {
            const node = bjjNodesData.find(n => n.id === nodeId);
            const text = `🥋 ${node.title}\n${node.desc}`;
            const url = `${window.location.origin}${window.location.pathname}?node=${nodeId}`;
            if (window.Telegram?.WebApp?.openLink) {
                window.Telegram.WebApp.openLink(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`);
            } else {
                navigator.clipboard.writeText(`${text}\n${url}`).then(() => alert('Ссылка скопирована!'));
            }
            triggerHaptic('medium');
        };

        // ================== GRAPH EVENTS ==================
        network.on('click', function(params) { 
            if (params.nodes.length) {
                renderNodeDetails(params.nodes[0]);
            }
        });

        function showContextMenu(nodeId, position) {
            const menu = document.getElementById('contextMenu');
            menu.style.display = 'block';
            menu.style.left = `${position.x}px`;
            menu.style.top = `${position.y}px`;
            
            document.getElementById('ctxMarkDone').onclick = async () => { await updateProgress(nodeId, 'done'); hideContextMenu(); };
            document.getElementById('ctxMarkProgress').onclick = async () => { await updateProgress(nodeId, 'in_progress'); hideContextMenu(); };
            document.getElementById('ctxFocus').onclick = () => { network.focus(nodeId, { scale: 1.5, animation: { duration: 400 } }); hideContextMenu(); };

            setTimeout(() => {
                document.addEventListener('click', hideContextMenu, { once: true });
                document.addEventListener('touchstart', hideContextMenu, { once: true });
            }, 100);
        }

        function hideContextMenu() {
            document.getElementById('contextMenu').style.display = 'none';
        }

        // ================== SEARCH ==================
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase().trim();
            if (q.length < 2) return;
            const found = bjjNodesData.find(n => n.label.toLowerCase().includes(q));
            if (found) focusNode(found.id);
        });

        // ================== INFO MODAL ==================
        const modalContent = {
            0: `<h2 class="text-lg font-bold text-slate-800 mb-2">О карте</h2><p class="text-slate-600">Интерактивная карта техник БЖЖ с легальностью, баллами, реакциями и персональным стилем.</p>`,
            1: `<h2 class="text-lg font-bold text-slate-800 mb-2">Как пользоваться</h2><ol class="list-decimal pl-5 text-slate-600 space-y-2"><li>Выберите правила (IBJJF Gi/No‑Gi, ADCC).</li><li>Отметьте свой стиль (кнопка «🧑‍🎤 Стиль»).
