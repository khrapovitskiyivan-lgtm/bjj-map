        }

        const setProgress = async (id, status) => { 
            progress[id] = status; 
            localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
            await syncProgressToServer(progress);
            updateGlobalProgress(); 
            updateNodeColors(); 
            triggerHaptic('light'); 
        };

        function updateNodeColors() {
            const learnedSet = new Set(Object.keys(progress).filter(id => progress[id] === 'done'));
            const availableSet = new Set();
            edges.forEach(edge => {
                if (learnedSet.has(String(edge.from)) && !learnedSet.has(String(edge.to))) availableSet.add(edge.to);
                if (learnedSet.has(String(edge.to)) && !learnedSet.has(String(edge.from))) availableSet.add(edge.from);
            });
            nodes.forEach(node => {
                const status = progress[node.id] || 'not_started';
                let color = status === 'done' ? { background: '#4CAF50', border: '#2E7D32' } :
                            status === 'in_progress' ? { background: '#f59e0b', border: '#d97706' } :
                            availableSet.has(node.id) ? { background: '#FFC107', border: '#FF9800' } :
                            { background: groups[node.group]?.color?.background || '#ccc', opacity: 0.6 };
                nodes.update({ id: node.id, color });
            });
        }

        function updateGlobalProgress() {
            const total = bjjNodesData.length;
            const done = Object.values(progress).filter(v => v === 'done').length;
            document.getElementById('globalProgressBtn').textContent = `${Math.round((done / total) * 100)}%`;
        }

        window.fitGraph = () => { 
            if (network) {
                network.fit({ 
                    animation: { duration: 500, easingFunction: 'easeInOutQuad' }
                });
                triggerHaptic('light');
            }
        };

        window.toggleMenu = () => {
            document.getElementById('settingsMenu').classList.toggle('hidden');
            triggerHaptic('light');
        };

        let giFilterState = 'gi', currentCategoryFilter = null, currentRule = 'none', styleFilterActive = false;
        let styleProfile = JSON.parse(localStorage.getItem('bjj_style_profile') || '{"belt": "white"}');
        const beltOrder = ['white', 'blue', 'purple', 'brown', 'black'];

        function applyAllFilters() {
            const userBelt = styleProfile.belt || 'white';
            const maxBeltIndex = beltOrder.indexOf(userBelt);

            nodes.forEach(n => {
                const nodeBeltIndex = beltOrder.indexOf(n.belt);
                const passBelt = nodeBeltIndex <= maxBeltIndex;
                
                if (!passBelt) { nodes.update({ id: n.id, hidden: true }); return; }
                if (currentCategoryFilter !== null && n.group !== currentCategoryFilter) { nodes.update({ id: n.id, hidden: true }); return; }
                if ((giFilterState === 'gi' && !n.gi) || (giFilterState === 'nogi' && !n.noGi)) { nodes.update({ id: n.id, hidden: true }); return; }
                
                let passRule = true;
                if (currentRule === 'ibjjf_gi') passRule = n.legal_ibjjf_gi;
                else if (currentRule === 'ibjjf_nogi') passRule = n.legal_ibjjf_nogi;
                else if (currentRule === 'adcc') passRule = n.legal_adcc;
                
                if (!passRule) { nodes.update({ id: n.id, hidden: false, opacity: 0.3 }); return; }
                nodes.update({ id: n.id, hidden: false, opacity: 1.0 });
            });
            edges.forEach(e => {
                const from = nodes.get(e.from), to = nodes.get(e.to);
                if (from && to) edges.update({ id: e.id, hidden: from.hidden || to.hidden });
            });
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const val = this.dataset.filter;
                if (this.classList.contains('active') && currentCategoryFilter === val) {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    currentCategoryFilter = null;
                } else {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active'); currentCategoryFilter = val;
                }
                applyAllFilters(); triggerHaptic('light');
            });
        });

        document.querySelectorAll('.rule-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.rule-btn').forEach(b => b.classList.remove('active-rule'));
                this.classList.add('active-rule'); currentRule = this.dataset.rule; applyAllFilters(); triggerHaptic('light');
            });
        });

        window.toggleGiFilter = () => {
            giFilterState = giFilterState === 'gi' ? 'nogi' : 'gi';
            document.getElementById('giToggleBtn').textContent = giFilterState === 'gi' ? 'Gi' : 'No-Gi';
            document.getElementById('giToggleBtn').classList.toggle('active', giFilterState === 'gi');
            applyAllFilters(); triggerHaptic('light');
        };

        document.addEventListener('click', function(e) {
            if (e.target.closest('.belt-btn')) {
                const btn = e.target.closest('.belt-btn');
                document.querySelectorAll('.belt-btn').forEach(b => b.classList.remove('active-belt'));
                btn.classList.add('active-belt');
                triggerHaptic('light');
            }
        });

        window.openStyleModal = () => {
            document.getElementById('styleModal').classList.remove('hidden');

            document.getElementById('stylePressure').checked = !!styleProfile.pressure;
            document.getElementById('styleLong').checked = !!styleProfile.long_limbs;

        window.saveStyleProfile = () => {

            styleProfile = { 
                belt: activeBeltBtn ? activeBeltBtn.dataset.belt : 'white',
                flexibility: document.getElementById('styleFlex').checked,

                long_limbs: document.getElementById('styleLong').checked, 
                speed: document.getElementById('styleSpeed').checked 
            };
            localStorage.setItem('bjj_style_profile', JSON.stringify(styleProfile));
            closeStyleModal(); 
            applyAllFilters(); 
            triggerHaptic('medium');
        };

        class BottomSheet {
            constructor() {
                this.sheet = document.getElementById('bottomSheet');
                this.overlay = document.getElementById('bottomSheetOverlay');
                this.handle = document.getElementById('bottomSheetHandle');
                this.startY = 0; this.isDragging = false;
                this.handle.addEventListener('touchstart', (e) => this.startDrag(e));
                document.addEventListener('touchmove', (e) => this.onDrag(e));
                document.addEventListener('touchend', () => this.endDrag());
                this.overlay.addEventListener('click', () => this.hide());
            }
            show() { this.sheet.classList.add('active'); this.overlay.classList.add('active'); triggerHaptic('medium'); }
            hide() { this.sheet.classList.remove('active'); this.overlay.classList.remove('active'); this.sheet.style.transform = ''; }
            startDrag(e) { this.startY = e.touches[0].clientY; this.isDragging = true; }
            onDrag(e) { if (!this.isDragging) return; const diff = e.touches[0].clientY - this.startY; if (diff > 0) this.sheet.style.transform = `translateY(${diff}px)`; }
            endDrag() {
                if (!this.isDragging) return; this.isDragging = false;
                const currentTransform = this.sheet.style.transform;
                const diff = currentTransform ? parseInt(currentTransform.replace('translateY(', '').replace('px)', '')) : 0;
                if (diff > 100) this.hide(); else this.sheet.style.transform = '';
            }
        }
        const bottomSheet = new BottomSheet();

        function renderNodeDetails(nodeId) {
            const n = bjjNodesData.find(x => x.id === nodeId);
            if (!n) return;
            const status = progress[nodeId] || 'not_started';
            const catLabels = { position:'Позиция', submission:'Сабмишен', sweep:'Свип', guard_pass:'Проход', transition:'Переход', escape:'Защита', takedown:'Тейкдаун' };
            const beltIcons = { white:'', blue:'🔵', purple:'', brown:'🟤', black:'' };
            
            let badges = [];
            if (n.gi) badges.push('<span class="px-2 py-0.5 bg-indigo-50 text-indigo-600 rounded text-xs border border-indigo-200">🥋 Gi</span>');
            if (n.noGi) badges.push('<span class="px-2 py-0.5 bg-cyan-50 text-cyan-600 rounded text-xs border border-cyan-200">🩳 No-Gi</span>');
            
            let legal = [];
            legal.push(n.legal_ibjjf_gi ? '✅ IBJJF Gi' : '🚫 IBJJF Gi');
            legal.push(n.legal_ibjjf_nogi ? '✅ IBJJF No-Gi' : '🚫 IBJJF No-Gi');
            legal.push(n.legal_adcc ? '✅ ADCC' : '🚫 ADCC');
            
            let tags = [];
            if (n.tags.includes('flexibility')) tags.push('🧘');

            if (n.tags.includes('long_limbs')) tags.push('🕷️');
            if (n.tags.includes('speed')) tags.push('⚡');

            const linked = bjjEdgesData.filter(e => e.from === nodeId || e.to === nodeId);
            const triggers = {}, noTrigger = [];
            linked.forEach(e => {
                const relId = e.from === nodeId ? e.to : e.from;
                const relNode = bjjNodesData.find(x => x.id === relId);
                const dir = e.from === nodeId ? '→' : '←';
                if (e.trigger) { if (!triggers[e.trigger]) triggers[e.trigger] = []; triggers[e.trigger].push({ id: relId, label: relNode ? relNode.label : relId, dir }); }
                else { noTrigger.push({ id: relId, label: relNode ? relNode.label : relId, dir }); }
            });

            let linkedHtml = '';
            for (const [trig, items] of Object.entries(triggers)) {
                linkedHtml += `<div class="mb-2"><span class="text-xs font-semibold text-slate-500">${trig}</span>`;
                items.forEach(i => { linkedHtml += `<button onclick="focusNode(${i.id})" class="flex items-center gap-2 w-full text-left px-3 py-1.5 bg-slate-50 hover:bg-slate-100 rounded-lg transition text-sm border border-slate-100 mt-1"><span class="text-slate-400">${i.dir}</span><span class="font-medium text-slate-700">${i.label}</span></button>`; });
                linkedHtml += `</div>`;
            }
            if (noTrigger.length > 0) {
                linkedHtml += `<div class="mb-2"><span class="text-xs font-semibold text-slate-500">Всегда доступно</span>`;
                noTrigger.forEach(i => { linkedHtml += `<button onclick="focusNode(${i.id})" class="flex items-center gap-2 w-full text-left px-3 py-1.5 bg-slate-50 hover:bg-slate-100 rounded-lg transition text-sm border border-slate-100 mt-1"><span class="text-slate-400">${i.dir}</span><span class="font-medium text-slate-700">${i.label}</span></button>`; });
                linkedHtml += `</div>`;
            }

            document.getElementById('nodeDetails').innerHTML = `
                <div class="fade-in">
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex-1">
                            <h2 class="text-lg font-bold text-slate-800 mb-1">${n.title}</h2>
                            <div class="flex gap-2 flex-wrap">
                                <span class="px-2 py-0.5 bg-slate-100 rounded text-xs text-slate-600 border border-slate-200">${catLabels[n.group]}</span>
                                <span class="px-2 py-0.5 bg-slate-100 rounded text-xs text-slate-600 border border-slate-200">${beltIcons[n.belt]} ${n.belt}</span>
                                ${badges.join('')}
                            </div>
                            <div class="text-xs text-slate-500 mt-1.5 space-x-2">${legal.join(' · ')}</div>
                            ${tags.length ? `<div class="text-xs mt-1">${tags.join(' ')}</div>` : ''}
                        </div>
                        <button onclick="shareNode(${nodeId})" class="p-2 bg-slate-100 rounded-lg hover:bg-slate-200 transition text-slate-500 ml-2" title="Поделиться">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                        </button>
                    </div>
                    <p class="text-slate-600 text-sm mb-4 leading-relaxed">${n.desc}</p>
                    <div class="mb-4">
                        <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Прогресс</h3>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="updateProgress(${nodeId}, 'not_started')" class="progress-btn ${status==='not_started'?'active-not':'bg-slate-50 text-slate-500 border border-slate-200'} py-2 rounded-lg text-xs font-medium">Не начал</button>
                            <button onclick="updateProgress(${nodeId}, 'in_progress')" class="progress-btn ${status==='in_progress'?'active-progress':'bg-slate-50 text-slate-500 border border-slate-200'} py-2 rounded-lg text-xs font-medium">В процессе</button>
                            <button onclick="updateProgress(${nodeId}, 'done')" class="progress-btn ${status==='done'?'active-done':'bg-slate-50 text-slate-500 border border-slate-200'} py-2 rounded-lg text-xs font-medium">Изучено</button>
                        </div>
                    </div>
                    ${linkedHtml ? `<div class="border-t border-slate-200 pt-3"><h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Реакции и продолжения</h3><div class="flex flex-col gap-1 max-h-40 overflow-y-auto">${linkedHtml}</div></div>` : ''}
                </div>`;
            bottomSheet.show();
        }

        window.updateProgress = (id, status) => { setProgress(id, status); renderNodeDetails(id); };
        window.focusNode = (id) => { network.focus(id, { scale: 1.8, animation: true }); setTimeout(() => { network.selectNodes([id]); renderNodeDetails(id); }, 300); };
        
        window.shareNode = (nodeId) => {
            const n = bjjNodesData.find(x => x.id === nodeId);
            const text = `🥋 ${n.title}\n${n.desc}`;
            const url = `${window.location.origin}${window.location.pathname}?node=${nodeId}`;
            if (navigator.share) { navigator.share({ title: n.title, text: text, url: url }).catch(console.error); } 
            else { navigator.clipboard.writeText(`${text}\n${url}`).then(() => alert('Ссылка скопирована!')); }
            triggerHaptic('medium');
        };

        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');

            const matches = bjjNodesData.filter(n => n.label.toLowerCase().includes(q) || n.title.toLowerCase().includes(q));
            if (matches.length > 0) {
                searchResults.innerHTML = matches.map(n => `
                    <div onclick="focusNode(${n.id}); searchInput.value=''; searchResults.classList.add('hidden')" class="px-4 py-3 hover:bg-slate-50 cursor-pointer border-b border-slate-100 last:border-0 flex items-center gap-3 transition">
                        <span class="text-lg">${groupIcons[n.group] || '🥋'}</span>

                    </div>`).join('');

        network.on('click', function(params) { if (params.nodes.length) renderNodeDetails(params.nodes[0]); });

        window.toggleDarkMode = () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('bjj_dark_mode', isDark);
            document.getElementById('themeToggle').innerHTML = isDark ? '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>' : '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>';

        const modalContent = {
            0: `<h2 class="text-lg font-bold text-slate-800 mb-3">О карте BJJ Map</h2>
                <p class="text-slate-600 mb-3">Интерактивная карта техник БЖЖ, построенная в виде графа. Показывает связи между позициями, переходами и атаками.</p>
                <p class="text-slate-600"><strong>Особенности:</strong><br>• Учет правил (IBJJF, ADCC)<br>• Персонализация под стиль и пояс<br>• Синхронизация прогресса</p>`,

                </div>`
        };
        
        window.openInfoModal = () => { document.getElementById('infoModal').classList.remove('hidden'); switchTab(0); };

        window.switchTab = (idx) => {
            document.getElementById('modalContent').innerHTML = modalContent[idx];
            document.querySelectorAll('.tab-btn').forEach((b, i) => { 
                if (i === idx) { b.classList.add('text-blue-600', 'border-b-2', 'border-blue-600'); b.classList.remove('text-slate-400'); } 
                else { b.classList.remove('text-blue-600', 'border-b-2', 'border-blue-600'); b.classList.add('text-slate-400'); }
            });

        window.openProgressModal = () => {
            const list = document.getElementById('progressListContent');
            const inProgress = bjjNodesData.filter(n => progress[n.id] === 'in_progress');
            const done = bjjNodesData.filter(n => progress[n.id] === 'done');
            
            const beltStats = beltOrder.map(b => {
                const total = bjjNodesData.filter(n => n.belt === b).length;
                const doneCount = done.filter(n => n.belt === b).length;

                return { belt: b, total, done: doneCount, percent };
            });

            let html = '<div class="space-y-3 mb-6">';

                    <div>

                        </div>
                    </div>`;
            });
            html += '</div>';

            if (inProgress.length === 0 && done.length === 0) {
                html += '<p class="text-center text-slate-500 py-4">Вы пока не отметили ни одной техники.</p>';

                    html += `<h3 class="font-bold text-slate-700 mb-2 text-sm">📚 В процессе (${inProgress.length})</h3><div class="space-y-2 mb-4">`;
                    inProgress.forEach(n => { html += `<div onclick="focusNode(${n.id}); closeProgressModal()" class="p-2 bg-amber-50 border border-amber-200 rounded-lg cursor-pointer hover:bg-amber-100 transition flex items-center gap-2 text-sm"><span>${groupIcons[n.group] || '🥋'}</span><span class="font-medium">${n.label}</span></div>`; });
                    html += `</div>`;
                }
                if (done.length > 0) {
                    html += `<h3 class="font-bold text-slate-700 mb-2 text-sm">✅ Изучено (${done.length})</h3><div class="space-y-2">`;

                    html += `</div>`;

            }
            list.innerHTML = html;
            document.getElementById('progressModal').classList.remove('hidden');

        window.closeProgressModal = () => document.getElementById('progressModal').classList.add('hidden');

        window.exportProgress = () => {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(progress));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "bjj_progress_backup.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
            triggerHaptic('medium');
        };

        window.importProgress = (input) => {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (typeof importedData === 'object' && importedData !== null) {
                        progress = importedData;
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
                        await syncProgressToServer(progress);
                        updateGlobalProgress();
                        updateNodeColors();
                        alert('✅ Прогресс успешно восстановлен!');
                        closeInfoModal();
                    } else { alert('❌ Неверный формат файла'); }
                } catch (err) { alert('❌ Ошибка чтения файла'); }
            };
            reader.readAsText(file);
            input.value = '';
        };

        initApp();
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js').catch(console.error);
    </script>
