            if (!supabase) return;

                    progress: progressObj,
                    updated_at: new Date().toISOString()

            } catch (e) { console.warn('Sync error:', e); }
        }

            { id: 49, label: "Прямой рычаг голеностопа", group: "submission", title: "Straight Ankle Lock", desc: "Выпрямление стопы, давление на ахилл.", belt: 'white', gi: true, noGi: true, legal_ibjjf_gi: true, legal_ibjjf_nogi: true, legal_adcc: true, points: 0, tags: [] },
            { id: 52, label: "Скручивание пятки", group: "submission", title: "Heel Hook", desc: "Скручивание пятки, нагрузка на колено.", belt: 'brown', gi: true, noGi: true, legal_ibjjf_gi: false, legal_ibjjf_nogi: false, legal_adcc: true, points: 0, tags: [] },
            { id: 70, label: "Свип «ножницы»", group: "sweep", title: "Scissor Sweep", desc: "Сбивание соперника скрестным движением ног.", belt: 'white', gi: true, noGi: true, legal_ibjjf_gi: true, legal_ibjjf_nogi: true, legal_adcc: true, points: 2, tags: [] },
            { id: 71, label: "Свип «цветок»", group: "sweep", title: "Flower Sweep", desc: "Переворот через плечо с захватом ноги.", belt: 'white', gi: true, noGi: true, legal_ibjjf_gi: true, legal_ibjjf_nogi: true, legal_adcc: true, points: 2, tags: [] },
            { id: 90, label: "Knee slice pass", group: "guard_pass", title: "Knee slice pass", desc: "Проход через колено в полугарде.", belt: 'white', gi: true, noGi: true, legal_ibjjf_gi: true, legal_ibjjf_nogi: true, legal_adcc: true, points: 3, tags: ['pressure'] },
            { id: 91, label: "Double under pass", group: "guard_pass", title: "Double under pass", desc: "Проход с захватом двух ног под плечи.", belt: 'white', gi: true, noGi: true, legal_ibjjf_gi: true, legal_ibjjf_nogi: true, legal_adcc: true, points: 3, tags: ['pressure'] },
            { id: 93, label: "Toreando pass", group: "guard_pass", title: "Toreando pass", desc: "Быстрый проход с разбросом ног.", belt: 'white', gi: true, noGi: true, legal_ibjjf_gi: true, legal_ibjjf_nogi: true, legal_adcc: true, points: 3, tags: ['speed'] },
            { id: 150, label: "Двойной проход", group: "takedown", title: "Double Leg Takedown", desc: "Проход в обе ноги.", belt: 'white', gi: true, noGi: true, legal_ibjjf_gi: true, legal_ibjjf_nogi: true, legal_adcc: true, points: 2, tags: ['speed'] },
            { id: 151, label: "Одинарный проход", group: "takedown", title: "Single Leg Takedown", desc: "Захват одной ноги.", belt: 'white', gi: true, noGi: true, legal_ibjjf_gi: true, legal_ibjjf_nogi: true, legal_adcc: true, points: 2, tags: [] }
        ];

        const bjjEdgesData = [
            { from: 1, to: 30, trigger: "Соперник отклоняется назад" },
            { from: 1, to: 31, trigger: "Соперник давит вниз" },
            { from: 1, to: 32, trigger: "Соперник ставит руку на ковёр" },
            { from: 1, to: 34, trigger: "Соперник встаёт" },
            { from: 1, to: 35, trigger: "Соперник открывает ворот" },
            { from: 1, to: 70, trigger: "Соперник давит вперёд" },
            { from: 1, to: 71, trigger: "Соперник давит вниз" },
            { from: 3, to: 46, trigger: "Соперник оставляет руку" },
            { from: 5, to: 30, trigger: "Соперник выставляет руку" },
            { from: 5, to: 31, trigger: "Соперник давит вперёд" },
            { from: 7, to: 31, trigger: "Соперник тянет назад" },
            { from: 14, to: 44, trigger: "Соперник выставляет руку" },
            { from: 14, to: 45, trigger: "Соперник прижимает локоть" },
            { from: 14, to: 46, trigger: "Соперник открывает дальнюю руку" },
            { from: 16, to: 37, trigger: "Соперник выставляет руку" },
            { from: 16, to: 39, trigger: "Соперник прижимает локоть" },
            { from: 17, to: 42, trigger: "Соперник открывает шею" },
            { from: 21, to: 150, trigger: "Соперник стоит прямо" },
            { from: 21, to: 151, trigger: "Соперник выставляет ногу" },
            { from: 70, to: 16 }, { from: 71, to: 16 },
            { from: 90, to: 14 }, { from: 91, to: 14 }, { from: 93, to: 14 },
            { from: 150, to: 14 }, { from: 151, to: 14 }
        ];

        // ================== VIS.JS INIT ==================
        let network = null;
        const nodes = new vis.DataSet(bjjNodesData.map(n => ({
            id: n.id, label: n.label, group: n.group, title: n.title, desc: n.desc,
            belt: n.belt, gi: n.gi, noGi: n.noGi,
            legal_ibjjf_gi: n.legal_ibjjf_gi, legal_ibjjf_nogi: n.legal_ibjjf_nogi,
            legal_adcc: n.legal_adcc, points: n.points, tags: n.tags
        })));
        const edges = new vis.DataSet(bjjEdgesData);

        function initGraph() {
            const container = document.getElementById('mynetwork');
            network = new vis.Network(container, { nodes, edges }, {
                groups,
                nodes: { size: window.innerWidth < 768 ? 28 : 22, font: { size: window.innerWidth < 768 ? 14 : 12, color: '#ffffff', strokeWidth: 3, strokeColor: '#000000' } },
                edges: { arrows: { to: { enabled: true, scaleFactor: 0.8 } }, color: '#cbd5e1', width: 2 },
                physics: { solver: 'forceAtlas2Based', forceAtlas2Based: { gravitationalConstant: -50 }, stabilization: { iterations: 150 } },
                interaction: { hover: true, dragNodes: true, dragView: true, zoomView: true }
            });
            
            network.on('click', function(params) { 
                if (params.nodes.length) renderNodeDetails(params.nodes[0]);
            });
            
            console.log('✅ Граф инициализирован с', bjjNodesData.length, 'узлами');
        }

        // ================== PROGRESS ==================
        const STORAGE_KEY = 'bjj_learned_v3';
        let progress = {};
        
        async function initProgress() {
            const serverProgress = await loadProgressFromServer();
            if (serverProgress) {
                progress = serverProgress;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
            } else {
                progress = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            }
            updateGlobalProgress();
            updateNodeColors();
        }

        const setProgress = async (id, status) => { 
            progress[id] = status; 
            localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
            await syncProgressToServer(progress);
            updateGlobalProgress(); 
            updateNodeColors(); 
            triggerHaptic('light'); 
        };

        function updateNodeColors() {
            const learnedSet = new Set(Object.keys(progress).filter(id => progress[id] === 'done'));
            nodes.forEach(node => {
                const status = progress[node.id] || 'not_started';
                let color;
                if (status === 'done') color = { background: '#4CAF50', border: '#2E7D32' };
                else if (status === 'in_progress') color = { background: '#f59e0b', border: '#d97706' };
                else { const orig = groups[node.group]?.color?.background || '#ccc'; color = { background: orig, opacity: 0.6 }; }
                nodes.update({ id: node.id, color });
            });
        }

        function updateGlobalProgress() {
            const total = bjjNodesData.length;
            const done = Object.values(progress).filter(v => v === 'done').length;
            const percent = Math.round((done / total) * 100);
            const textEl = document.getElementById('globalProgressText');
            const barEl = document.getElementById('progressBar');
            if (textEl) textEl.textContent = `${percent}%`;
            if (barEl) barEl.style.width = `${percent}%`;
        }

        // ================== BOTTOM SHEET ==================
        class BottomSheet {
            constructor() {
                this.sheet = document.getElementById('bottomSheet');
                this.overlay = document.getElementById('bottomSheetOverlay');
                this.handle = document.getElementById('bottomSheetHandle');
                this.startY = 0; this.isDragging = false;
                this.handle.addEventListener('touchstart', (e) => { this.startY = e.touches[0].clientY; this.isDragging = true; });
                document.addEventListener('touchmove', (e) => { if (!this.isDragging) return; const diff = e.touches[0].clientY - this.startY; if (diff > 0) this.sheet.style.transform = `translateY(${diff}px)`; });
                document.addEventListener('touchend', () => { if (!this.isDragging) return; this.isDragging = false; const t = this.sheet.style.transform; const diff = t ? parseInt(t.replace(/\D/g,'')) : 0; if (diff > 100) this.hide(); else this.sheet.style.transform = ''; });
                this.overlay.addEventListener('click', () => this.hide());
            }
            show() { this.sheet.classList.add('active'); this.overlay.classList.add('active'); triggerHaptic('medium'); }
            hide() { this.sheet.classList.remove('active'); this.overlay.classList.remove('active'); this.sheet.style.transform = ''; triggerHaptic('light'); }
        }
        const bottomSheet = new BottomSheet();

        // ================== DETAILS ==================
        function renderNodeDetails(nodeId) {
            const nodeData = bjjNodesData.find(n => n.id === nodeId);
            if (!nodeData) return;
            const currentStatus = progress[nodeId] || 'not_started';
            const categoryLabels = { position:'Позиция', submission:'Сабмишен', sweep:'Свип', guard_pass:'Проход', transition:'Переход', escape:'Защита', takedown:'Тейкдаун' };
            const beltIcons = { white:'⚪', blue:'🔵', purple:'🟣', brown:'🟤', black:'⚫' };
            
            const legalIcons = [];
            legalIcons.push(nodeData.legal_ibjjf_gi ? '✅ IBJJF Gi' : '🚫 IBJJF Gi');
            legalIcons.push(nodeData.legal_ibjjf_nogi ? '✅ IBJJF No‑Gi' : '🚫 IBJJF No‑Gi');
            legalIcons.push(nodeData.legal_adcc ? '✅ ADCC' : '🚫 ADCC');

            const linkedEdges = bjjEdgesData.filter(e => e.from === nodeId || e.to === nodeId);
            const triggerGroups = {};
            linkedEdges.forEach(edge => {
                const relatedId = edge.from === nodeId ? edge.to : edge.from;
                const relatedNode = bjjNodesData.find(n => n.id === relatedId);
                if (!edge.trigger) return;
                if (!triggerGroups[edge.trigger]) triggerGroups[edge.trigger] = [];
                triggerGroups[edge.trigger].push({ relatedId, relatedNode, direction: edge.from === nodeId ? '→' : '←' });
            });

            let linkedHtml = '';
            for (const [trigger, items] of Object.entries(triggerGroups)) {
                linkedHtml += `<div class="mb-2"><span class="text-xs font-semibold text-slate-500">${trigger}</span>`;
                items.forEach(item => {
                    linkedHtml += `<button onclick="focusNode(${item.relatedId})" class="flex items-center gap-2 w-full text-left px-3 py-1 bg-slate-50 hover:bg-slate-100 rounded-lg text-sm border border-slate-100 mt-1"><span class="text-slate-400">${item.direction}</span><span class="font-medium text-slate-700">${item.relatedNode ? item.relatedNode.label : item.relatedId}</span></button>`;
                });
                linkedHtml += `</div>`;
            }

            document.getElementById('nodeDetails').innerHTML = `
                <div class="fade-in">
                    <h2 class="text-lg font-bold text-slate-800 mb-1">${nodeData.title}</h2>
                    <div class="flex gap-2 flex-wrap mb-2">
                        <span class="px-2 py-0.5 bg-slate-100 rounded text-xs text-slate-600 border border-slate-200">${categoryLabels[nodeData.group]}</span>
                        <span class="px-2 py-0.5 bg-slate-100 rounded text-xs text-slate-600 border border-slate-200">${beltIcons[nodeData.belt]} ${nodeData.belt}</span>
                    </div>
                    <div class="text-xs text-slate-500 mb-2">${legalIcons.join(' · ')}</div>
                    <p class="text-slate-600 text-sm mb-4">${nodeData.desc}</p>
                    <div class="mb-4">
                        <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Прогресс</h3>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="updateProgress(${nodeId}, 'not_started')" class="progress-btn ${currentStatus==='not_started'?'active-not':'bg-slate-50 text-slate-500 border border-slate-200'} py-2 rounded-lg text-xs font-medium">Не начал</button>
                            <button onclick="updateProgress(${nodeId}, 'in_progress')" class="progress-btn ${currentStatus==='in_progress'?'active-progress':'bg-slate-50 text-slate-500 border border-slate-200'} py-2 rounded-lg text-xs font-medium">В процессе</button>
                            <button onclick="updateProgress(${nodeId}, 'done')" class="progress-btn ${currentStatus==='done'?'active-done':'bg-slate-50 text-slate-500 border border-slate-200'} py-2 rounded-lg text-xs font-medium">Изучено</button>
                        </div>
                    </div>
                    ${linkedHtml ? `<div class="border-t border-slate-200 pt-3"><h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Реакции</h3>${linkedHtml}</div>` : ''}
                </div>`;
            bottomSheet.show();
        }

        window.updateProgress = async (id, status) => { await setProgress(id, status); renderNodeDetails(id); };
        window.focusNode = (id) => { if (network) { network.focus(id, { scale: 1.8, animation: true }); setTimeout(() => { network.selectNodes([id]); renderNodeDetails(id); }, 300); } };
        window.fitGraph = () => { if (network) network.fit({ animation: true }); };

        // ================== FILTERS ==================
        let giFilterState = 'gi';
        let currentCategoryFilter = null;
        let currentRule = 'none';
        let styleFilterActive = false;
        let styleProfile = JSON.parse(localStorage.getItem('bjj_style_profile') || '{}');

        function applyAllFilters() {
            nodes.forEach(n => {
                let show = true;
                if (currentCategoryFilter && n.group !== currentCategoryFilter) show = false;
                const passGi = (giFilterState === 'gi' && n.gi) || (giFilterState === 'nogi' && n.noGi);
                if (!passGi) show = false;
                let passRule = true;
                if (currentRule === 'ibjjf_gi') passRule = n.legal_ibjjf_gi;
                else if (currentRule === 'ibjjf_nogi') passRule = n.legal_ibjjf_nogi;
                else if (currentRule === 'adcc') passRule = n.legal_adcc;
                
                if (!show) nodes.update({ id: n.id, hidden: true });
                else if (!passRule) nodes.update({ id: n.id, hidden: false, opacity: 0.3 });
                else nodes.update({ id: n.id, hidden: false, opacity: 1.0 });
            });
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            if (btn.id === 'styleFilterBtn') return;
            btn.addEventListener('click', function() {
                const filterValue = this.dataset.filter;
                if (this.classList.contains('active')) {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    currentCategoryFilter = null;
                } else {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentCategoryFilter = filterValue;
                }
                applyAllFilters();
                triggerHaptic('light');
            });
        });

        document.querySelectorAll('.rule-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.rule-btn').forEach(b => b.classList.remove('active-rule'));
                this.classList.add('active-rule');
                currentRule = this.dataset.rule;
                applyAllFilters();
                triggerHaptic('light');
            });
        });

        window.toggleGiFilter = () => {
            giFilterState = giFilterState === 'gi' ? 'nogi' : 'gi';
            const btn = document.getElementById('giToggleBtn');
            btn.textContent = giFilterState === 'gi' ? 'Gi' : 'No‑Gi';
            applyAllFilters();
            triggerHaptic('light');
        };

        window.toggleStyleFilter = () => {
            if (Object.keys(styleProfile).length === 0) { alert('Сначала заполните анкету стиля.'); return; }
            styleFilterActive = !styleFilterActive;
            document.getElementById('styleFilterBtn').classList.toggle('active', styleFilterActive);
            applyAllFilters();
        };

        window.openStyleModal = () => {
            document.getElementById('styleModal').classList.remove('hidden');
            document.getElementById('styleFlex').checked = !!styleProfile.flexibility;
            document.getElementById('stylePressure').checked = !!styleProfile.pressure;
            document.getElementById('styleLong').checked = !!styleProfile.long_limbs;
            document.getElementById('styleSpeed').checked = !!styleProfile.speed;
        };
        window.closeStyleModal = () => document.getElementById('styleModal').classList.add('hidden');
        window.saveStyleProfile = () => {
            styleProfile = {
                flexibility: document.getElementById('styleFlex').checked,
                pressure: document.getElementById('stylePressure').checked,
                long_limbs: document.getElementById('styleLong').checked,
                speed: document.getElementById('styleSpeed').checked
            };
            localStorage.setItem('bjj_style_profile', JSON.stringify(styleProfile));
            closeStyleModal();
            triggerHaptic('medium');
        };

        window.openInfoModal = () => document.getElementById('infoModal').classList.remove('hidden');
        window.closeInfoModal = () => document.getElementById('infoModal').classList.add('hidden');

        // ================== SEARCH ==================
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase().trim();
            if (q.length < 2) return;
            const found = bjjNodesData.find(n => n.label.toLowerCase().includes(q) || n.title.toLowerCase().includes(q));
            if (found) focusNode(found.id);
        });

        // ================== ИНИЦИАЛИЗАЦИЯ ==================
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                console.log('Запуск приложения...');
                
                // 1. СНАЧАЛА всегда рисуем граф (самое важное!)
                initGraph();
                
                // 2. Пытаемся загрузить прогресс (если Supabase падает — не страшно)
                try {
                    await initProgress();
                } catch (e) {
                    console.warn('Ошибка загрузки прогресса, работаем локально:', e);
                    progress = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
                    updateGlobalProgress();
                    updateNodeColors();
                }
                
                // 3. Применяем фильтры
                applyAllFilters();
                
                console.log('✅ Приложение готово! Узлов:', bjjNodesData.length);
            } catch (error) {
                console.error('Критическая ошибка:', error);
                // Даже при ошибке пытаемся показать граф
                if (!network) {
                    try { initGraph(); } catch(e) { console.error('Не удалось инициализировать граф:', e); }
                }
            }
        });
    </script>
</body>
</html>
