// ========== ЛОГИКА ИЗУЧЕННЫХ ТЕХНИК ==========
// Ключ для localStorage
const STORAGE_KEY = 'bjj_learned_techniques';

// Загружаем изученные техники (массив id)
function getLearned() {
    const data = localStorage.getItem(STORAGE_KEY);
    return data ? JSON.parse(data) : [];
}

// Сохраняем массив id
function saveLearned(ids) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(ids));
}

// Добавить/удалить технику из изученных
function toggleLearnedTech(id) {
    let learned = getLearned();
    if (learned.includes(id)) {
        learned = learned.filter(i => i !== id);
    } else {
        learned.push(id);
    }
    saveLearned(learned);
    updateNodeColors();
    updateCardButtons(id);
}

// Обновить цвета узлов в зависимости от изученных
function updateNodeColors() {
    const learned = getLearned();
    const learnedSet = new Set(learned);

    // Собираем соседей изученных узлов (доступные)
    const availableSet = new Set();
    edges.forEach(edge => {
        if (learnedSet.has(edge.from) && !learnedSet.has(edge.to)) {
            availableSet.add(edge.to);
        }
        if (learnedSet.has(edge.to) && !learnedSet.has(edge.from)) {
            availableSet.add(edge.from);
        }
    });

    // Проходим по всем узлам и задаём цвет
    const allNodes = nodes.get();
    allNodes.forEach(node => {
        let color;
        if (learnedSet.has(node.id)) {
            color = { background: '#4CAF50', border: '#2E7D32' };
        } else if (availableSet.has(node.id)) {
            color = { background: '#FFC107', border: '#FF9800' };
        } else {
            // Оставляем оригинальный цвет группы, но делаем тусклее
            const orig = groups[node.group]?.color?.background || '#ccc';
            color = { background: orig, opacity: 0.6 };
        }
        nodes.update({ id: node.id, color: color });
    });
}

// Обновляем кнопки в карточке
function updateCardButtons(nodeId) {
    const learned = getLearned();
    const isLearned = learned.includes(nodeId);
    document.getElementById('learn-btn').style.display = isLearned ? 'none' : 'inline-block';
    document.getElementById('forget-btn').style.display = isLearned ? 'inline-block' : 'none';
}

// Глобальная переменная для текущего выбранного узла
let selectedNodeId = null;

// Обработчик клика по узлу
function onNodeClick(params) {
    if (params.nodes.length > 0) {
        selectedNodeId = params.nodes[0];
        const node = nodes.get(selectedNodeId);
        document.getElementById('card-title').innerText = node.label;
        document.getElementById('card-cat').innerText = 'Категория: ' + node.group;
        document.getElementById('node-card').style.display = 'block';
        updateCardButtons(selectedNodeId);
    } else {
        document.getElementById('node-card').style.display = 'none';
        selectedNodeId = null;
    }
}

// Привязываем глобальную функцию для кнопок
window.toggleLearned = function() {
    if (selectedNodeId !== null) {
        toggleLearnedTech(selectedNodeId);
    }
};

// ========== ИНИЦИАЛИЗАЦИЯ ГРАФА ==========
const container = document.getElementById('mynetwork');
const options = {
    groups: groups,
    edges: {
        arrows: { to: { enabled: true, scaleFactor: 0.8 } },
        font: { size: 10, align: 'horizontal' }
    },
    physics: {
        solver: 'forceAtlas2Based',
        forceAtlas2Based: { gravitationalConstant: -50 }
    },
    interaction: { hover: true }
};

const network = new vis.Network(container, { nodes, edges }, options);
network.on('click', onNodeClick);

// Первоначальная раскраска и скрываем карточку при клике мимо
document.getElementById('node-card').style.display = 'none';
updateNodeColors();
