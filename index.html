localStorage.setItem('bjj_style_profile', JSON.stringify(styleProfile));
triggerHaptic('medium');
renderOnboardingStep();
setTimeout(() => nextOnboardingStep(), 400);
};

async function closeOnboarding(skip = false) {
const modal = document.getElementById('onboarding-modal');
modal.classList.remove('active');
setTimeout(() => modal.classList.add('hidden'), 300);
await saveSetting('bjj_onboarding_seen', true);
applyAllFilters();
updateNodeColors();
setTimeout(() => {
if (network) network.fit({ animation: { duration: 500, easingFunction: 'easeInOutQuad' } });
}, 400);
}
// === ПРИМЕНЕНИЕ ФИЛЬТРА СВЯЗЕЙ И СИСТЕМ ===
async function applyEdgeFilters() {
await saveSetting('bjj_edge_filter', activeEdgeTypes);
await saveSetting('bjj_system_filter', activeSystems);
edges.forEach(e => {
const typeOk = activeEdgeTypes[e.type] !== false;
const fromNode = nodes.get(e.from);
const toNode = nodes.get(e.to);
let systemOk = true;
if (fromNode && fromNode.group === 'system' && !activeSystems[fromNode.id]) systemOk = false;
if (toNode && toNode.group === 'system' && !activeSystems[toNode.id]) systemOk = false;
edges.update({ id: e.id, hidden: !typeOk || !systemOk });
});
nodes.forEach(n => {
if (n.group === 'system') {
nodes.update({ id: n.id, hidden: activeSystems[n.id] === false });
}
});
triggerHaptic('light');
}

// === РЕНДЕР МОДАЛКИ ФИЛЬТРА ===
function renderEdgeFilterModal() {
const content = document.getElementById('edgeFilterContent');
const edgeCounts = { attack: 0, sweep: 0, transition: 0, escape: 0, setup: 0 };
edges.forEach(e => { if (edgeCounts[e.type] !== undefined) edgeCounts[e.type]++; });

let typesHtml = `
<div class="modal-section">
<div class="modal-section-title">Типы связей</div>
<div class="quick-actions">
<button class="quick-action-btn" onclick="setAllEdgeTypes(true)">✓ Включить все</button>
<button class="quick-action-btn" onclick="setAllEdgeTypes(false)">✕ Выключить все</button>
</div>
`;
Object.entries(edgeTypeLabels).forEach(([type, info]) => {
const active = activeEdgeTypes[type] !== false;
typesHtml += `
<label class="edge-filter-item ${active ? 'active' : ''}" onclick="toggleEdgeType('${type}')">
<input type="checkbox" ${active ? 'checked' : ''} onclick="event.stopPropagation(); toggleEdgeType('${type}')">
<div class="edge-filter-line" style="background:${info.color}"></div>
<div class="edge-filter-label">
<div class="edge-filter-title">${info.title}</div>
<div class="edge-filter-desc">${info.desc}</div>
</div>
<div class="edge-filter-count">${edgeCounts[type] || 0}</div>
</label>
`;
});
typesHtml += `</div>`;

let systemsHtml = `
<div class="modal-section">
<div class="modal-section-title">Системы BJJ</div>
<div class="quick-actions">
<button class="quick-action-btn" onclick="setAllSystems(true)">✓ Включить все</button>
<button class="quick-action-btn" onclick="setAllSystems(false)">✕ Выключить все</button>
</div>
`;
Object.entries(systemPyramids).forEach(([sysId, sys]) => {
const active = activeSystems[sysId] !== false;
const sysBeltIndex = beltOrder.indexOf(sys.belt);
const userBeltIndex = beltOrder.indexOf(styleProfile.belt || 'white');
const available = sysBeltIndex <= userBeltIndex;
const totalTechs = sys.levels.reduce((s, l) => s + l.ids.length, 0);
systemsHtml += `
<label class="edge-filter-item ${active ? 'active' : ''}"
onclick="${available ? `toggleSystem('${sysId}')` : ''}"
style="${!available ? 'opacity:0.4;cursor:not-allowed;' : ''}">
<input type="checkbox" ${active ? 'checked' : ''} ${!available ? 'disabled' : ''}
onclick="event.stopPropagation(); ${available ? `toggleSystem('${sysId}')` : ''}">
<div class="text-xl flex-shrink-0">${sys.icon}</div>
<div class="edge-filter-label">
<div class="edge-filter-title flex items-center gap-1.5">
<span>${sys.name}</span>
<span class="text-xs">${beltIcons[sys.belt]}</span>
</div>
<div class="edge-filter-desc">${sys.description}</div>
</div>
<div class="edge-filter-count">${totalTechs}</div>
</label>
`;
});
systemsHtml += `</div>`;
content.innerHTML = typesHtml + systemsHtml;
}

// === ПЕРЕКЛЮЧАТЕЛИ ===
window.toggleEdgeType = (type) => {
activeEdgeTypes[type] = !activeEdgeTypes[type];
applyEdgeFilters();
renderEdgeFilterModal();
};
window.setAllEdgeTypes = (value) => {
Object.keys(activeEdgeTypes).forEach(k => activeEdgeTypes[k] = value);
applyEdgeFilters();
renderEdgeFilterModal();
triggerHaptic('medium');
};
window.toggleSystem = (sysId) => {
activeSystems[sysId] = !activeSystems[sysId];
applyEdgeFilters();
renderEdgeFilterModal();
};
window.setAllSystems = (value) => {
Object.keys(activeSystems).forEach(k => activeSystems[k] = value);
applyEdgeFilters();
renderEdgeFilterModal();
triggerHaptic('medium');
};

// === ЗАПУСК ===
(async () => {
  await initApp();
  // Загружаем фильтры связей и систем
  const savedEdgeFilter = await loadSetting('bjj_edge_filter', null);
  if (savedEdgeFilter) activeEdgeTypes = { ...activeEdgeTypes, ...savedEdgeFilter };
  const savedSystemFilter = await loadSetting('bjj_system_filter', null);
  if (savedSystemFilter) activeSystems = { ...activeSystems, ...savedSystemFilter };
  // Применяем после инициализации графа
  setTimeout(() => applyEdgeFilters(), 500);
})();

// Гарантированный вызов applyAllFilters через 2 секунды
setTimeout(() => {
    applyAllFilters();
    updateNodeColors();
    updateGlobalProgress();
}, 2000);

// Регистрация service worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js').catch(console.error);
}

// 🔵 Показываем onboarding при первом запуске (через 1.5 сек)
setTimeout(async () => {
    const onboardingSeen = await loadSetting('bjj_onboarding_seen', false);
    if (!onboardingSeen) {
        showOnboarding();
    }
}, 1500);
// 🆕 Коррекция высоты для Telegram WebApp
function adjustViewportHeight() {
  const vh = window.innerHeight * 0.01;
  document.documentElement.style.setProperty('--vh', `${vh}px`);
  document.body.style.height = `${window.innerHeight}px`;
  document.documentElement.style.height = `${window.innerHeight}px`;
}

adjustViewportHeight();
window.addEventListener('resize', adjustViewportHeight);
window.addEventListener('orientationchange', adjustViewportHeight);

if (window.Telegram?.WebApp) {
  window.Telegram.WebApp.onEvent('viewportChanged', adjustViewportHeight);
}
</script>
</body>
</html>
