<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BJJ Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://visjs.github.io/vis-network/standalone/umd/vis-network.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f1f5f9; color: #1e293b; margin: 0; }
        #mynetwork { width: 100%; height: 60vh; min-height: 400px; background: white; border-radius: 16px; border: 1px solid #e2e8f0; }
        .node-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .filter-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
        .progress-btn { transition: all 0.2s; }
        .progress-btn.active-not { background: #e2e8f0; color: #475569; border: 1px solid #cbd5e1; }
        .progress-btn.active-progress { background: #fef3c7; color: #b45309; border: 1px solid #fcd34d; }
        .progress-btn.active-done { background: #d1fae5; color: #047857; border: 1px solid #6ee7b7; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <header class="p-4 bg-white shadow-sm border-b border-slate-200 sticky top-0 z-50">
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2">
                <h1 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <span class="text-2xl">🥋</span> BJJ Map
                </h1>
                <button id="giToggleBtn" onclick="cycleGiFilter()" class="ml-2 px-3 py-1 rounded-full text-xs font-medium border transition bg-white border-slate-300 text-slate-700 hover:bg-slate-50">Все</button>
            </div>
            <div class="flex flex-col items-end gap-0.5">
                <button onclick="openInfoModal()" class="w-8 h-8 bg-slate-100 hover:bg-slate-200 rounded-full flex items-center justify-center text-slate-500 transition" title="Информация">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
                </button>
                <div class="text-xs font-medium text-slate-500 bg-slate-100 px-2 py-0.5 rounded-full" id="globalProgressText">0%</div>
            </div>
        </div>
        <div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar">
            <button class="filter-btn active whitespace-nowrap px-3 py-1.5 rounded-full bg-white border border-slate-300 text-slate-700 font-medium text-sm" data-filter="all">Все</button>
            <button class="filter-btn whitespace-nowrap px-3 py-1.5 rounded-full bg-white border border-slate-300 text-slate-700 font-medium text-sm" data-filter="position">Позиции</button>
            <button class="filter-btn whitespace-nowrap px-3 py-1.5 rounded-full bg-white border border-slate-300 text-slate-700 font-medium text-sm" data-filter="transition">Переходы</button>
            <button class="filter-btn whitespace-nowrap px-3 py-1.5 rounded-full bg-white border border-slate-300 text-slate-700 font-medium text-sm" data-filter="submission">Сабмишены</button>
        </div>
        <div class="relative mt-3">
            <input type="text" id="searchInput" placeholder="Поиск техники..." class="w-full bg-white border border-slate-300 rounded-xl px-4 py-2.5 text-sm text-slate-700 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
            <svg class="absolute right-3 top-3 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </div>
        <div class="w-full h-1.5 bg-slate-200 rounded-full mt-3 overflow-hidden"><div id="progressBar" class="h-full bg-emerald-500 rounded-full transition-all duration-500" style="width: 0%;"></div></div>
    </header>
    <main class="flex-1 p-4 flex flex-col gap-4">
        <div class="relative">
            <div id="mynetwork"></div>
            <div class="absolute bottom-3 right-3">
                <button onclick="fitGraph()" class="w-10 h-10 bg-white border border-slate-200 rounded-full flex items-center justify-center text-slate-600 shadow-sm active:scale-95 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
                </button>
            </div>
        </div>
        <div id="nodeDetails" class="bg-white rounded-2xl p-5 node-card shadow-md border border-slate-200 max-h-[35vh] overflow-y-auto">
            <div class="text-center py-4 text-slate-400"><svg class="w-10 h-10 mx-auto mb-2 opacity-50" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"/></svg><p class="text-sm">Нажмите на узел графа,<br>чтобы увидеть детали и отметить прогресс</p></div>
        </div>
    </main>
    <div id="infoModal" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
        <div class="bg-white border border-slate-200 rounded-2xl w-11/12 max-w-md max-h-[80vh] flex flex-col overflow-hidden shadow-xl">
            <div class="flex border-b border-slate-200">
                <button class="tab-btn flex-1 py-3 text-sm font-semibold text-slate-400 hover:text-slate-600" data-tab="0">О карте</button>
                <button class="tab-btn flex-1 py-3 text-sm font-semibold text-slate-400 hover:text-slate-600" data-tab="1">Как пользоваться</button>
                <button class="tab-btn flex-1 py-3 text-sm font-semibold text-slate-400 hover:text-slate-600" data-tab="2">Обозначения</button>
            </div>
            <div class="overflow-y-auto p-5 text-sm text-slate-700 space-y-4" id="modalContent"></div>
            <button onclick="closeInfoModal()" class="m-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-xl text-slate-700 font-medium transition">Закрыть</button>
        </div>
    </div>

    <script>
        if (window.Telegram?.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
            window.Telegram.WebApp.setHeaderColor('#ffffff');
            window.Telegram.WebApp.setBackgroundColor('#f1f5f9');
        }
        const triggerHaptic = (type = 'light') => { if (window.Telegram?.WebApp?.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred(type); };

        // ================== DATA ==================
        const groups = {
            position:   { color: { background: '#00BCD4' }, shape: 'dot', size: 25 },
            submission: { color: { background: '#f44336' }, shape: 'triangle', size: 22 },

            { id: 5, label: "Баттерфляй гард (снизу)", group: "position", title: "Баттерфляй гард (снизу) — Butterfly Guard (bottom)", desc: "Стопы на бёдрах, колени раскрыты.", belt: 'blue', gi: true, noGi: true },
            { id: 6, label: "Баттерфляй гард (сверху)", group: "position", title: "Баттерфляй гард (сверху) — Butterfly Guard (top)", desc: "Противник в баттерфляе, ищешь проход.", belt: 'blue', gi: true, noGi: true },

            { id: 9, label: "Обратный де ла Рива (снизу)", group: "position", title: "Обратный де ла Рива (снизу) — Reverse De La Riva (bottom)", desc: "Зацеп изнутри бедра.", belt: 'purple', gi: true, noGi: true },

        // ================== PROGRESS ==================
        const STORAGE_KEY = 'bjj_learned_v3';
        const getProgress = () => JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        const setProgress = (id, status) => { const p = getProgress(); p[id] = status; localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); updateGlobalProgress(); updateNodeColors(); triggerHaptic('light'); };

        function updateNodeColors() {
            const progress = getProgress();
            const learnedSet = new Set(Object.keys(progress).filter(id => progress[id] === 'done'));
            const availableSet = new Set();
            edges.forEach(edge => {
                if (learnedSet.has(edge.from) && !learnedSet.has(edge.to)) availableSet.add(edge.to);
                if (learnedSet.has(edge.to) && !learnedSet.has(edge.from)) availableSet.add(edge.from);
            });
            nodes.forEach(node => {
                const status = progress[node.id] || 'not_started';
                let color;
                if (status === 'done') color = { background: '#4CAF50', border: '#2E7D32' };
                else if (status === 'in_progress') color = { background: '#f59e0b', border: '#d97706' };
                else if (availableSet.has(node.id)) color = { background: '#FFC107', border: '#FF9800' };
                else { const orig = groups[node.group]?.color?.background || '#ccc'; color = { background: orig, opacity: 0.6 }; }
                nodes.update({ id: node.id, color });
            });
        }

        function updateGlobalProgress() {
            const progress = getProgress();
            const total = bjjNodesData.length;
            const done = Object.values(progress).filter(v => v === 'done').length;
            const percent = Math.round((done / total) * 100);
            document.getElementById('globalProgressText').textContent = `${percent}%`;
            document.getElementById('progressBar').style.width = `${percent}%`;
        }

            updateGiButtonLabel();
            applyAllFilters();
            triggerHaptic('light');
        };

        // ================== FILTERS ==================
        function applyAllFilters() {
            const activeCategoryBtn = document.querySelector('.filter-btn.active');
            const categoryFilter = activeCategoryBtn ? activeCategoryBtn.dataset.filter : 'all';
            nodes.forEach(n => nodes.update({ id: n.id, hidden: true }));
            nodes.forEach(n => {
                if (categoryFilter === 'all' || n.group === categoryFilter) {
                    if (giFilterState === 'all' || (giFilterState === 'gi' && n.gi) || (giFilterState === 'nogi' && n.noGi)) {
                        nodes.update({ id: n.id, hidden: false });
                    }
                }
            });
            edges.forEach(e => {
                const from = nodes.get(e.from);
                const to = nodes.get(e.to);
                if (from && to) edges.update({ id: e.id, hidden: from.hidden || to.hidden });
            });
        }

                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <h2 class="text-lg font-bold text-slate-800 mb-1">${nodeData.title}</h2>
                            <div class="flex gap-2 flex-wrap">
                                <span class="px-2 py-0.5 bg-slate-100 rounded text-xs text-slate-600 border border-slate-200">${categoryLabels[nodeData.group]}</span>
                                <span class="px-2 py-0.5 bg-slate-100 rounded text-xs text-slate-600 border border-slate-200">${beltIcons[nodeData.belt]} ${nodeData.belt}</span>
                                ${badges.join('')}
                            </div>
                        </div>
                        <button onclick="shareNode(${nodeId})" class="p-2 bg-slate-100 rounded-lg hover:bg-slate-200 transition text-slate-500"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></button>
                    </div>
                    <p class="text-slate-600 text-sm mb-4 leading-relaxed">${nodeData.desc}</p>
                    <div class="mb-4">
                        <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Прогресс</h3>
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="updateProgress(${nodeId}, 'not_started')" class="progress-btn ${currentStatus==='not_started'?'active-not':'bg-slate-50 text-slate-500 border border-slate-200'} py-2 rounded-lg text-xs font-medium">Не начал</button>
                            <button onclick="updateProgress(${nodeId}, 'in_progress')" class="progress-btn ${currentStatus==='in_progress'?'active-progress':'bg-slate-50 text-slate-500 border border-slate-200'} py-2 rounded-lg text-xs font-medium">В процессе</button>
                            <button onclick="updateProgress(${nodeId}, 'done')" class="progress-btn ${currentStatus==='done'?'active-done':'bg-slate-50 text-slate-500 border border-slate-200'} py-2 rounded-lg text-xs font-medium">Изучено</button>
                        </div>
                    </div>
                    ${linkedHtml ? `<div class="border-t border-slate-200 pt-3"><h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Связанные техники</h3><div class="flex flex-col gap-1 max-h-40 overflow-y-auto">${linkedHtml}</div></div>` : ''}
                </div>`;
        }

        window.updateProgress = (id, status) => { setProgress(id, status); renderNodeDetails(id); };
        window.focusNode = (id) => { network.focus(id, { scale: 1.8, animation: true }); setTimeout(() => { network.selectNodes([id]); renderNodeDetails(id); }, 300); };
        window.fitGraph = () => { network.fit({ animation: true }); };
        window.shareNode = (nodeId) => {
            const node = bjjNodesData.find(n => n.id === nodeId);
            const text = `🥋 ${node.title}\n${node.desc}`;
            const url = `${window.location.origin}${window.location.pathname}?node=${nodeId}`;
            if (window.Telegram?.WebApp?.openLink) {
                window.Telegram.WebApp.openLink(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`);
            } else {
                navigator.clipboard.writeText(`${text}\n${url}`).then(() => alert('Ссылка скопирована!'));
            }
            triggerHaptic('medium');
        };

        network.on('click', function(params) { if (params.nodes.length) renderNodeDetails(params.nodes[0]); });

        // ================== SEARCH ==================
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase().trim();
            if (q.length < 2) return;
            const found = bjjNodesData.find(n => n.label.toLowerCase().includes(q));
            if (found) focusNode(found.id);
        });

        // ================== MODAL ==================
        const modalContent = {
            0: `<h2 class="text-lg font-bold text-slate-800 mb-2">О карте</h2><p class="text-slate-600">Интерактивная карта техник БЖЖ, построенная по принципу дерева навыков. Отмечайте приёмы, которыми уже владеете, и карта покажет, какие техники можно изучить дальше.</p>`,
            1: `<h2 class="text-lg font-bold text-slate-800 mb-2">Как пользоваться</h2><ol class="list-decimal pl-5 text-slate-600 space-y-2"><li>Кликайте на узлы — появится карточка с названием и описанием.</li><li>Нажмите «В процессе» или «Изучено», чтобы отметить прогресс.</li><li>Доступные для изучения техники подсвечиваются жёлтым.</li><li>Нажмите на связанную технику в карточке, чтобы быстро перейти к ней.</li><li>Прогресс сохраняется на устройстве.</li></ol>`,
            2: `<h2 class="text-lg font-bold text-slate-800 mb-2">Обозначения</h2><p class="text-slate-600 mb-2">Цвета и формы узлов обозначают категории:</p><ul class="space-y-1 text-slate-600"><li><span style="background:#00BCD4;display:inline-block;width:12px;height:12px;border-radius:50%;"></span> Позиция</li><li><span style="background:#f44336;display:inline-block;width:12px;height:12px;border-radius:2px;"></span> Сабмишен</li><li><span style="background:#FF9800;display:inline-block;width:12px;height:12px;"></span> Свип</li><li><span style="background:#2196F3;display:inline-block;width:12px;height:12px;border-radius:50%;"></span> Проход</li><li><span style="background:#9C27B0;display:inline-block;width:12px;height:12px;"></span> Переход</li><li><span style="background:#795548;display:inline-block;width:12px;height:12px;border-radius:50%;"></span> Защита</li><li><span style="background:#607D8B;display:inline-block;width:12px;height:12px;"></span> Тейкдаун</li></ul><p class="text-slate-600 mt-2">Стрелки обозначают связи: setup, transition, follow_up, escape, guard_pass.</p>`
        };
        window.openInfoModal = () => { document.getElementById('infoModal').classList.remove('hidden'); switchTab(0); };
        window.closeInfoModal = () => document.getElementById('infoModal').classList.add('hidden');
        window.switchTab = (idx) => {
            document.getElementById('modalContent').innerHTML = modalContent[idx];
            document.querySelectorAll('.tab-btn').forEach((b, i) => { b.classList.toggle('text-blue-600', i === idx); b.classList.toggle('font-semibold', i === idx); });
        };

        // ================== INIT ==================
        updateGlobalProgress();
        updateNodeColors();
        updateGiButtonLabel();
        applyAllFilters();
        const urlParams = new URLSearchParams(window.location.search);
        const startNode = urlParams.get('node');
        if (startNode && bjjNodesData.find(n => n.id == startNode)) setTimeout(() => focusNode(parseInt(startNode)), 500);
    </script>
</body>
</html>
