        .progress-btn.active-done { background: #d1fae5; color: #047857; border: 1px solid #6ee7b7; }

        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
        body.dark ::-webkit-scrollbar-track { background: #1e293b; }
        body.dark ::-webkit-scrollbar-thumb { background: #475569; }
        .rule-btn.active-rule { background: #0f172a; color: white; border-color: #0f172a; }
        body.dark .rule-btn.active-rule { background: #3b82f6; border-color: #3b82f6; }
        
        .bottom-sheet-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 998; }

        .bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 20px 20px 0 0; box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.15); transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 999; max-height: 85vh; overflow-y: auto; padding-bottom: max(20px, env(safe-area-inset-bottom)); }
        body.dark .bottom-sheet { background: #1e293b; }
        .bottom-sheet.active { transform: translateY(0); }
        .bottom-sheet-handle { width: 40px; height: 4px; background: #cbd5e0; border-radius: 2px; margin: 12px auto; cursor: grab; }
        body.dark .bottom-sheet-handle { background: #475569; }
        .bottom-sheet-content { padding: 0 20px 20px; }
        
        body.dark header { background: #1e293b; border-color: #334155; }

        body.dark .bg-slate-100 { background: #334155; }

            if (!supabaseEnabled) return;
            try {
                const telegramId = (window.Telegram?.WebApp?.initDataUnsafe?.user?.id || 'anonymous').toString();

                    telegram_id: telegramId, 
                    progress: progressObj,
                    updated_at: new Date().toISOString()

            } catch (err) { console.error('Supabase sync catch:', err); }
        }

        window.exportProgress = () => {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(progress));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "bjj_progress_backup.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
            triggerHaptic('medium');
        };

        window.importProgress = (input) => {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (typeof importedData === 'object' && importedData !== null) {
                        progress = importedData;
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
                        await syncProgressToServer(progress);
                        updateGlobalProgress();
                        updateNodeColors();
                        alert('✅ Прогресс успешно восстановлен!');
                        closeInfoModal();
                    } else {
                        alert('❌ Неверный формат файла');
                    }
                } catch (err) {
                    alert('❌ Ошибка чтения файла');
                }
            };
            reader.readAsText(file);
            input.value = ''; // Сброс для повторного выбора
        };
        // ==========================================

        // Инициализация при загрузке
        initApp();
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js').catch(console.error);
    </script>
</body>
</html>
