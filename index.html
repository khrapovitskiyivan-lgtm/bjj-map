<style>
  /* Стили для чипов поиска */
.search-chip {
  padding: 6px 12px;
  border-radius: 999px;
  background: #ffffff;
  border: 1px solid #e2e8f0;
  font-size: 12px;
  font-weight: 500;
  color: #475569;
  white-space: nowrap;
  transition: all 0.2s;
  cursor: pointer;
}
.search-chip:hover { background: #f1f5f9; }
.search-chip.active {
  background: #3b82f6;
  color: white;
  border-color: #3b82f6;
  box-shadow: 0 2px 4px rgba(59, 130, 246, 0.3);
}

/* Тёмная тема для чипов */
body.dark .search-chip {
  background: #1e293b;
  border-color: #334155;
  color: #cbd5e1;
}
body.dark .search-chip:hover { background: #334155; }
body.dark .search-chip.active {
  background: #3b82f6;
  color: white;
  border-color: #3b82f6;
}
  body.dark #progressListContent .sticky {
  background: #1e293b !important;
}
  /* Чипы быстрого фильтра */
.search-chip {
  padding: 4px 10px;
  border-radius: 999px;
  background: #f1f5f9;
  border: 1px solid #e2e8f0;
  font-size: 11px;
  font-weight: 500;
  color: #475569;
  white-space: nowrap;
  transition: all 0.2s;
  cursor: pointer;
}
.search-chip:hover { background: #e2e8f0; }
.search-chip.active {
  background: #3b82f6;
  color: white;
  border-color: #3b82f6;
}
body.dark .search-chip {
  background: #334155;
  border-color: #475569;
  color: #cbd5e1;
}
body.dark .search-chip.active {
  background: #3b82f6;
  color: white;
}

/* История поиска */
.search-history-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  cursor: pointer;
  border-bottom: 1px solid #f1f5f9;
  transition: background 0.15s;
}
.search-history-item:hover { background: #f8fafc; }
body.dark .search-history-item { border-color: #334155; }
body.dark .search-history-item:hover { background: #1e293b; }

/* Подсветка совпадений */
.search-highlight {
  background: #fef08a;
  color: #854d0e;
  padding: 0 2px;
  border-radius: 2px;
  font-weight: 600;
}
body.dark .search-highlight {
  background: #854d0e;
  color: #fef08a;
}

/* Бейдж категории в результате */
.search-cat-badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  background: #e0e7ff;
  color: #4338ca;
  font-weight: 600;
}
body.dark .search-cat-badge {
  background: #312e81;
  color: #c7d2fe;
}

/* Бейдж пояса */
.search-belt-badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  background: #f1f5f9;
  color: #64748b;
}
body.dark .search-belt-badge {
  background: #334155;
  color: #94a3b8;
}

/* Кнопка очистки истории */
.clear-history-btn {
  font-size: 11px;
  color: #ef4444;
  padding: 8px 14px;
  cursor: pointer;
  border-top: 1px solid #e2e8f0;
  text-align: center;
  font-weight: 500;
}
.clear-history-btn:hover { background: #fef2f2; }
body.dark .clear-history-btn { border-color: #475569; }
body.dark .clear-history-btn:hover { background: #450a0a; }
  /* Onboarding Animations */
#onboarding-modal.active #onboarding-card {
  transform: scale(1);
  opacity: 1;
}
#onboarding-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background-color: #cbd5e1;
  transition: all 0.3s;
}
#onboarding-dot.active {
  background-color: #3b82f6;
  width: 16px;
  border-radius: 4px;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
background-color: #f1f5f9;
color: #1e293b;
margin: 0;
padding-top: env(safe-area-inset-top);

body.dark #mynetwork { background: #1e293b; }
.filter-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
.progress-btn { transition: all 0.2s; }
.progress-btn.active-not { background: #e2e8f0; color: #475569; border: 1px solid #cbd5e1; }
.progress-btn.active-progress { background: #fef3c7; color: #b45309; border: 1px solid #fcd34d; }
.progress-btn.active-done { background: #d1fae5; color: #047857; border: 1px solid #6ee7b7; }
.fade-in { animation: fadeIn 0.3s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #f1f5f9; }
::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
body.dark ::-webkit-scrollbar-track { background: #1e293b; }
body.dark ::-webkit-scrollbar-thumb { background: #475569; }
.rule-btn.active-rule { background: #0f172a; color: white; border-color: #0f172a; }
body.dark .rule-btn.active-rule { background: #3b82f6; border-color: #3b82f6; }
.belt-btn.active-belt {
background: #3b82f6 !important;
color: white !important;
border-color: #3b82f6 !important;
font-weight: 600;
}
body.dark .belt-btn.active-belt {
background: #3b82f6 !important;
color: white !important;
border-color: #3b82f6 !important;
}
  .bottom-sheet.active .bottom-sheet-content {
  animation: fadeSlideUp 0.4s ease-out 0.1s both;
}

@keyframes fadeSlideUp {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
.bottom-sheet-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  z-index: 998;
}
.bottom-sheet-overlay.active {
  opacity: 1;
  pointer-events: auto;
}
.bottom-sheet {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  /* Полупрозрачный белый фон */
  background: rgba(255, 255, 255, 0.72);
  /* Размытие фона за панелью */
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  /* Тонкая светлая граница сверху для эффекта стекла */
  border-top: 1px solid rgba(255, 255, 255, 0.5);
  border-radius: 24px 24px 0 0;
  /* Мягкая тень */
  box-shadow: 
    0 -8px 32px rgba(0, 0, 0, 0.12),
    0 0 0 1px rgba(255, 255, 255, 0.1) inset;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
  z-index: 999;
  max-height: 90vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  padding-bottom: 80px;
}
body.dark .bottom-sheet {
  background: rgba(15, 23, 42, 0.75);
  border-top: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 
    0 -8px 32px rgba(0, 0, 0, 0.4),
    0 0 0 1px rgba(255, 255, 255, 0.05) inset;
}
.bottom-sheet.active { transform: translateY(0); }
.bottom-sheet-handle {
  width: 40px;
  height: 4px;
  background: rgba(148, 163, 184, 0.5);
  border-radius: 2px;
  margin: 12px auto;
  cursor: grab;
  transition: background 0.2s;
}
  .bottom-sheet-handle:hover {
  background: rgba(148, 163, 184, 0.8);
}

body.dark .bottom-sheet-handle {
  background: rgba(148, 163, 184, 0.3);
}

body.dark .bottom-sheet-handle:hover {
  background: rgba(148, 163, 184, 0.6);
}
body.dark .bottom-sheet-handle { background: #475569; }
.bottom-sheet-content { padding: 0 20px 20px; }
body.dark header { background: #1e293b; border-color: #334155; }
body.dark .bg-white { background: #1e293b; }

.icon-btn:hover { background: #e2e8f0; }
body.dark .icon-btn:hover { background: #475569; }

</style>

class BottomSheet {
constructor() {
this.sheet = document.getElementById('bottomSheet');
this.overlay = document.getElementById('bottomSheetOverlay');
this.handle = document.getElementById('bottomSheetHandle');
this.content = document.getElementById('nodeDetails');
this.startY = 0;
this.isDragging = false;
this.handle.addEventListener('touchstart', (e) => this.startDrag(e));
this.handle.addEventListener('touchmove', (e) => this.onDrag(e));
this.handle.addEventListener('touchend', () => this.endDrag());
this.overlay.addEventListener('click', () => this.hide());
}
show() {
this.sheet.classList.add('active');
this.overlay.classList.add('active');
triggerHaptic('medium');
}
hide() {
this.sheet.classList.remove('active');
this.overlay.classList.remove('active');
this.sheet.style.transform = '';
}
startDrag(e) {
this.startY = e.touches[0].clientY;
this.isDragging = true;
}
onDrag(e) {
if (!this.isDragging) return;
e.preventDefault();
const diff = e.touches[0].clientY - this.startY;
if (diff > 0) this.sheet.style.transform = `translateY(${diff}px)`;
}
endDrag() {
if (!this.isDragging) return;
this.isDragging = false;
const currentTransform = this.sheet.style.transform;
const diff = currentTransform ? parseInt(currentTransform.replace('translateY(', '').replace('px)', '')) : 0;
if (diff > 100) this.hide();
else this.sheet.style.transform = '';
}
}

const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
const searchHistory = document.getElementById('searchHistory');
const searchChips = document.getElementById('searchChips');

let currentSearchFilter = 'all';
const SEARCH_HISTORY_KEY = 'bjj_search_history';
const MAX_HISTORY = 5;

// Загрузка истории
function getSearchHistory() {
  try {
    return JSON.parse(localStorage.getItem(SEARCH_HISTORY_KEY) || '[]');
  } catch { return []; }
}

function saveSearchHistory(query) {
  if (!query || query.length < 2) return;
  let history = getSearchHistory();
  history = history.filter(q => q.toLowerCase() !== query.toLowerCase());
  history.unshift(query);
  history = history.slice(0, MAX_HISTORY);
  localStorage.setItem(SEARCH_HISTORY_KEY, JSON.stringify(history));
}

function clearSearchHistory() {
  localStorage.removeItem(SEARCH_HISTORY_KEY);
  showSearchHistory('');
}

// Показать историю
function showSearchHistory(query) {
  const history = getSearchHistory();
  if (query.length > 0 || history.length === 0) {
    searchHistory.classList.add('hidden');
    return;
  }
  
  let html = '<div class="text-xs font-semibold text-slate-500 px-4 py-2">🕐 Недавние запросы</div>';
  history.forEach(q => {
    html += `<div class="search-history-item" onclick="applySearch('${q.replace(/'/g, "\\'")}')">
      <span class="text-sm text-slate-700 dark:text-slate-200">🔍 ${q}</span>
      <span class="text-slate-400 text-xs">›</span>
    </div>`;
  });
  html += `<div class="clear-history-btn" onclick="clearSearchHistory()">Очистить историю</div>`;
  
  searchHistory.innerHTML = html;
  searchHistory.classList.remove('hidden');
}

// Применить запрос из истории
window.applySearch = (query) => {
  searchInput.value = query;
  searchHistory.classList.add('hidden');
  performSearch(query);
  triggerHaptic('light');
};

// Подсветка совпадений
function highlightText(text, query) {
  if (!query || query.length < 2) return text;
  const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(regex, '<span class="search-highlight">$1</span>');
}

// Основная функция поиска
function performSearch(query) {
  const q = query.toLowerCase().trim();
  
  if (q.length < 1) {
    searchResults.classList.add('hidden');
    if (getSearchHistory().length > 0) showSearchHistory(q);
    return;
  }
  
  // Сохраняем в историю
  saveSearchHistory(query);
  
  // Поиск по всем полям
  const matches = bjjNodesData.filter(n => {
    // Фильтр по категории
    if (currentSearchFilter !== 'all' && n.group !== currentSearchFilter) return false;
    
    // Поиск в названии
    const inLabel = n.label.toLowerCase().includes(q);
    const inTitle = n.title.toLowerCase().includes(q);
    
    // Поиск в описании
    const inDesc = n.desc && n.desc.toLowerCase().includes(q);
    
    // Поиск в techniqueDetails (механика, ключевые детали, когда применять, ошибки)
    const details = techniqueDetails[n.id] || {};
    const inMechanics = details.mechanics && details.mechanics.toLowerCase().includes(q);
    const inKeyPoints = details.keyPoints && details.keyPoints.toLowerCase().includes(q);
    const inWhen = details.when && details.when.toLowerCase().includes(q);
    const inMistakes = details.mistakes && details.mistakes.toLowerCase().includes(q);
    
    // Поиск по тегам стиля
    const inTags = n.tags && n.tags.some(t => {
      const tagMap = {
        'flexibility': 'гибкость',
        'pressure': 'давление',
        'speed': 'скорость',
        'long_limbs': 'длинные'
      };
      return t.includes(q) || (tagMap[t] && tagMap[t].includes(q));
    });
    
    // Поиск по поясу
    const beltMap = { 'white': 'белый', 'blue': 'синий', 'purple': 'фиолетовый', 'brown': 'коричневый', 'black': 'чёрный' };
    const inBelt = beltMap[n.belt] && beltMap[n.belt].includes(q);
    
    return inLabel || inTitle || inDesc || inMechanics || inKeyPoints || inWhen || inMistakes || inTags || inBelt;
  });
  
  // Сортировка: сначала точные совпадения в названии
  matches.sort((a, b) => {
    const aLabel = a.label.toLowerCase().includes(q);
    const bLabel = b.label.toLowerCase().includes(q);
    if (aLabel && !bLabel) return -1;
    if (!aLabel && bLabel) return 1;
    return 0;
  });
  
  if (matches.length > 0) {
    searchResults.innerHTML = `
      <div class="text-xs font-semibold text-slate-500 px-4 py-2 border-b border-slate-100">
        Найдено: ${matches.length}

      ${matches.slice(0, 20).map(n => {
        const catLabels = { position:'Позиция', submission:'Сабмишен', sweep:'Свип', guard_pass:'Проход', transition:'Переход', escape:'Защита', takedown:'Тейкдаун' };
        const beltIcons = { white:'⚪', blue:'', purple:'🟣', brown:'', black:'⚫' };
        const highlightedLabel = highlightText(n.label, q);
        const highlightedTitle = highlightText(n.title, q);
        
        return `
          <div onclick="focusNode(${n.id}); searchInput.value=''; searchResults.classList.add('hidden')" 
            class="px-4 py-3 hover:bg-slate-50 cursor-pointer border-b border-slate-100 last:border-0 transition">
            <div class="flex items-start gap-3">
              <div class="flex-shrink-0 mt-0.5">
                <span class="text-lg">${groupIcons[n.group] || ''}</span>
              </div>
              <div class="flex-1 min-w-0">
                <div class="font-medium text-sm text-slate-800 mb-1">${highlightedLabel}</div>
                <div class="text-xs text-slate-500 mb-1.5">${highlightedTitle}</div>
                <div class="flex gap-1.5 flex-wrap">
                  <span class="search-cat-badge">${catLabels[n.group]}</span>
                  <span class="search-belt-badge">${beltIcons[n.belt]} ${n.belt}</span>
                  ${n.tags.includes('speed') ? '<span class="search-belt-badge">⚡</span>' : ''}
                  ${n.tags.includes('flexibility') ? '<span class="search-belt-badge">🧘</span>' : ''}
                  ${n.tags.includes('pressure') ? '<span class="search-belt-badge">🦍</span>' : ''}
                  ${n.tags.includes('long_limbs') ? '<span class="search-belt-badge">🕷️</span>' : ''}
                </div>
              </div>
            </div>
          </div>`;
      }).join('')}
    `;
  } else {
    searchResults.innerHTML = `
      <div class="px-4 py-6 text-center">
        <div class="text-3xl mb-2">🔍</div>
        <div class="text-sm text-slate-500">Ничего не найдено</div>
        <div class="text-xs text-slate-400 mt-1">Попробуйте другой запрос или снимите фильтр</div>
      </div>`;
  }
  
  searchResults.classList.remove('hidden');
  searchHistory.classList.add('hidden');
}
