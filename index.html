<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>BJJ Map</title>
    
    <meta name="theme-color" content="#3b82f6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BJJ Map">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://visjs.github.io/vis-network/standalone/umd/vis-network.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js" onerror="console.log('Telegram Web App недоступен')"></script>
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f1f5f9; color: #1e293b; margin: 0; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
        body.dark { background-color: #0f172a; color: #e2e8f0; }
        #mynetwork { width: 100%; height: 60vh; min-height: 400px; background: white; border-radius: 16px; border: 1px solid #e2e8f0; touch-action: none; }
        body.dark #mynetwork { background: #1e293b; border-color: #334155; }
        .node-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .filter-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
        .progress-btn { transition: all 0.2s; }
        .progress-btn.active-not { background: #e2e8f0; color: #475569; border: 1px solid #cbd5e1; }
        .progress-btn.active-progress { background: #fef3c7; color: #b45309; border: 1px solid #fcd34d; }
        .progress-btn.active-done { background: #d1fae5; color: #047857; border: 1px solid #6ee7b7; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
        body.dark ::-webkit-scrollbar-track { background: #1e293b; }
        body.dark ::-webkit-scrollbar-thumb { background: #475569; }
        .rule-btn.active-rule { background: #0f172a; color: white; border-color: #0f172a; }
        body.dark .rule-btn.active-rule { background: #3b82f6; border-color: #3b82f6; }
        
        .bottom-sheet-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 998; }
        .bottom-sheet-overlay.active { opacity: 1; pointer-events: auto; }
        .bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 20px 20px 0 0; box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.15); transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 999; max-height: 85vh; overflow-y: auto; padding-bottom: max(20px, env(safe-area-inset-bottom)); }
        body.dark .bottom-sheet { background: #1e293b; }
        .bottom-sheet.active { transform: translateY(0); }
        .bottom-sheet-handle { width: 40px; height: 4px; background: #cbd5e0; border-radius: 2px; margin: 12px auto; cursor: grab; }
        body.dark .bottom-sheet-handle { background: #475569; }
        .bottom-sheet-content { padding: 0 20px 20px; }
        
        body.dark header { background: #1e293b; border-color: #334155; }
        body.dark .bg-white { background: #1e293b; }
        body.dark .bg-slate-100 { background: #334155; }
        body.dark .bg-slate-50 { background: #334155; }
        body.dark .text-slate-800 { color: #e2e8f0; }
        body.dark .text-slate-700 { color: #cbd5e1; }
        body.dark .text-slate-600 { color: #94a3b8; }
        body.dark .text-slate-500 { color: #64748b; }
        body.dark .border-slate-200 { border-color: #334155; }
        body.dark .border-slate-300 { border-color: #475569; }
        body.dark input { background: #334155; border-color: #475569; color: #e2e8f0; }
        body.dark input::placeholder { color: #64748b; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <header class="p-4 bg-white shadow-sm border-b border-slate-200 sticky top-0 z-50">
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2">
                <h1 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <span class="text-2xl">🥋</span> BJJ Map
                </h1>
                <button id="giToggleBtn" onclick="toggleGiFilter()" class="ml-2 px-3 py-1 rounded-full text-xs font-medium border transition active">Gi</button>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleDarkMode()" class="w-8 h-8 bg-slate-100 hover:bg-slate-200 rounded-full flex items-center justify-center text-slate-500 transition" title="Темная тема" id="themeToggle">🌙</button>
                <button onclick="openStyleModal()" class="text-xs px-2 py-1 rounded-full bg-slate-100 hover:bg-slate-200 transition" title="Анкета стиля">🧑‍🎤 Стиль</button>
                <!-- Активная кнопка прогресса -->
                <button id="globalProgressBtn" onclick="openProgressModal()" class="text-xs font-bold text-blue-600 bg-blue-50 hover:bg-blue-100 px-2.5 py-1 rounded-full transition border border-blue-200" title="Мой прогресс">0%</button>
                <!-- Иконка информации в правом углу -->
                <button onclick="openInfoModal()" class="w-8 h-8 bg-slate-100 hover:bg-slate-200 rounded-full flex items-center justify-center text-slate-500 transition" title="Информация">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
                </button>
            </div>
        </div>

        <div class="flex gap-2 overflow-x-auto pb-1 mb-2">
            <button class="rule-btn active-rule whitespace-nowrap px-2 py-1 rounded-full bg-white border border-slate-300 text-xs font-medium" data-rule="none">Без ограничений</button>
            <button class="rule-btn whitespace-nowrap px-2 py-1 rounded-full bg-white border border-slate-300 text-xs font-medium" data-rule="ibjjf_gi">IBJJF Gi</button>
            <button class="rule-btn whitespace-nowrap px-2 py-1 rounded-full bg-white border border-slate-300 text-xs font-medium" data-rule="ibjjf_nogi">IBJJF No‑Gi</button>
            <button class="rule-btn whitespace-nowrap px-2 py-1 rounded-full bg-white border border-slate-300 text-xs font-medium" data-rule="adcc">ADCC</button>
        </div>

        <div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar">
            <button class="filter-btn whitespace-nowrap px-3 py-1.5 rounded-full bg-white border border-slate-300 text-slate-700 font-medium text-sm" data-filter="position">Позиции</button>
            <button class="filter-btn whitespace-nowrap px-3 py-1.5 rounded-full bg-white border border-slate-300 text-slate-700 font-medium text-sm" data-filter="transition">Переходы</button>
            <button class="filter-btn whitespace-nowrap px-3 py-1.5 rounded-full bg-white border border-slate-300 text-slate-700 font-medium text-sm" data-filter="submission">Сабмишены</button>
            <button id="styleFilterBtn" class="filter-btn whitespace-nowrap px-3 py-1.5 rounded-full bg-white border border-slate-300 text-slate-700 font-medium text-sm" onclick="toggleStyleFilter()">⭐ Мой стиль</button>
        </div>

        <!-- Умный поиск с выпадающим списком -->
        <div class="relative mt-3">
            <input type="text" id="searchInput" placeholder="Поиск техники..." class="w-full bg-white border border-slate-300 rounded-xl px-4 py-2.5 text-sm text-slate-700 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
            <svg class="absolute right-3 top-3 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            
            <!-- Выпадающий список результатов -->
            <div id="searchResults" class="absolute top-full left-0 right-0 mt-1 bg-white border border-slate-200 rounded-xl shadow-lg max-h-60 overflow-y-auto hidden z-50">
                <!-- Результаты будут здесь -->
            </div>
        </div>
    </header>
    
    <main class="flex-1 p-4 flex flex-col gap-4">
        <div class="relative">
            <div id="mynetwork"></div>
            <div class="absolute bottom-3 right-3">
                <button onclick="fitGraph()" class="w-10 h-10 bg-white border border-slate-200 rounded-full flex items-center justify-center text-slate-600 shadow-sm active:scale-95 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
                </button>
            </div>
        </div>
    </main>

    <!-- Bottom Sheet для деталей техники -->
    <div class="bottom-sheet-overlay" id="bottomSheetOverlay"></div>
    <div class="bottom-sheet" id="bottomSheet">
        <div class="bottom-sheet-handle" id="bottomSheetHandle"></div>
        <div class="bottom-sheet-content" id="nodeDetails">
            <div class="text-center py-4 text-slate-400">
                <p class="text-sm">Нажмите на узел графа,<br>чтобы увидеть детали</p>
            </div>
        </div>
    </div>

    <!-- Модальное окно прогресса -->
    <div id="progressModal" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
        <div class="bg-white border border-slate-200 rounded-2xl w-11/12 max-w-md max-h-[80vh] flex flex-col overflow-hidden shadow-xl">
            <div class="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                <h2 class="text-lg font-bold text-slate-800">Мой прогресс</h2>
                <button onclick="closeProgressModal()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-200 text-slate-500 transition">✕</button>
            </div>
            <div class="overflow-y-auto p-4" id="progressListContent">
                <!-- Список техник -->
            </div>
        </div>
    </div>

    <!-- Модальное окно стиля -->
    <div id="styleModal" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
        <div class="bg-white border border-slate-200 rounded-2xl w-11/12 max-w-md p-5 shadow-xl">
            <h2 class="text-lg font-bold mb-3">Ваш стиль и телосложение</h2>
            <div class="space-y-3 text-sm">
                <label class="flex items-center gap-2"><input type="checkbox" id="styleFlex" class="accent-blue-500"> 🧘 Высокая гибкость</label>
                <label class="flex items-center gap-2"><input type="checkbox" id="stylePressure" class="accent-blue-500"> 🦍 Давление / тяжёлый вес</label>
                <label class="flex items-center gap-2"><input type="checkbox" id="styleLong" class="accent-blue-500"> 🕷️ Длинные конечности</label>
                <label class="flex items-center gap-2"><input type="checkbox" id="styleSpeed" class="accent-blue-500"> ⚡ Взрывная скорость</label>
            </div>
            <div class="flex gap-2 mt-4">
                <button onclick="saveStyleProfile()" class="flex-1 py-2 bg-blue-600 text-white rounded-xl font-medium">Сохранить</button>
                <button onclick="closeStyleModal()" class="flex-1 py-2 bg-slate-100 rounded-xl font-medium">Отмена</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно информации (2 вкладки) -->
    <div id="infoModal" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
        <div class="bg-white border border-slate-200 rounded-2xl w-11/12 max-w-md max-h-[80vh] flex flex-col overflow-hidden shadow-xl">
            <div class="flex border-b border-slate-200">
                <button class="tab-btn flex-1 py-3 text-sm font-semibold text-blue-600 border-b-2 border-blue-600" data-tab="0" onclick="switchTab(0)">О карте</button>
                <button class="tab-btn flex-1 py-3 text-sm font-semibold text-slate-400 hover:text-slate-600" data-tab="1" onclick="switchTab(1)">Как пользоваться</button>
            </div>
            <div class="overflow-y-auto p-5 text-sm text-slate-700 space-y-4" id="modalContent"></div>
            <button onclick="closeInfoModal()" class="m-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-xl text-slate-700 font-medium transition">Закрыть</button>
        </div>
    </div>

        function updateNodeColors() {
            const learnedSet = new Set(Object.keys(progress).filter(id => progress[id] === 'done'));
            const availableSet = new Set();
            edges.forEach(edge => {
                if (learnedSet.has(String(edge.from)) && !learnedSet.has(String(edge.to))) availableSet.add(edge.to);
                if (learnedSet.has(String(edge.to)) && !learnedSet.has(String(edge.from))) availableSet.add(edge.from);
            });
            nodes.forEach(node => {
                const status = progress[node.id] || 'not_started';
                let color;
                if (status === 'done') color = { background: '#4CAF50', border: '#2E7D32' };
                else if (status === 'in_progress') color = { background: '#f59e0b', border: '#d97706' };
                else if (availableSet.has(node.id)) color = { background: '#FFC107', border: '#FF9800' };
                else { color = { background: groups[node.group]?.color?.background || '#ccc', opacity: 0.6 }; }
                nodes.update({ id: node.id, color });
            });
        }

        const STORAGE_KEY = 'bjj_learned_v3';

        const setProgress = (id, status) => {

            localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
            updateGlobalProgress(); 
            updateNodeColors(); 
            triggerHaptic('light'); 
        };

        function updateNodeColors() {
            const learnedSet = new Set(Object.keys(progress).filter(id => progress[id] === 'done'));
            const availableSet = new Set();
            edges.forEach(edge => {
                if (learnedSet.has(String(edge.from)) && !learnedSet.has(String(edge.to))) availableSet.add(edge.to);
                if (learnedSet.has(String(edge.to)) && !learnedSet.has(String(edge.from))) availableSet.add(edge.from);
            });
            nodes.forEach(node => {
                const status = progress[node.id] || 'not_started';
                let color;
                if (status === 'done') color = { background: '#4CAF50', border: '#2E7D32' };
                else if (status === 'in_progress') color = { background: '#f59e0b', border: '#d97706' };
                else if (availableSet.has(node.id)) color = { background: '#FFC107', border: '#FF9800' };
                else { color = { background: groups[node.group]?.color?.background || '#ccc', opacity: 0.6 }; }
                nodes.update({ id: node.id, color });
            });
        }

            const total = bjjNodesData.length;
            const done = Object.values(progress).filter(v => v === 'done').length;

        class BottomSheet {
            constructor() {
                this.sheet = document.getElementById('bottomSheet');
                this.content = document.getElementById('nodeDetails');
                this.overlay = document.getElementById('bottomSheetOverlay');
                this.handle = document.getElementById('bottomSheetHandle');
                this.startY = 0; this.isDragging = false;
                this.handle.addEventListener('touchstart', (e) => this.startDrag(e));
                document.addEventListener('touchmove', (e) => this.onDrag(e));
                document.addEventListener('touchend', () => this.endDrag());
                this.overlay.addEventListener('click', () => this.hide());
            }
            show() { this.sheet.classList.add('active'); this.overlay.classList.add('active'); triggerHaptic('medium'); }
            hide() { this.sheet.classList.remove('active'); this.overlay.classList.remove('active'); this.sheet.style.transform = ''; }
            startDrag(e) { this.startY = e.touches[0].clientY; this.isDragging = true; }
            onDrag(e) { if (!this.isDragging) return; const diff = e.touches[0].clientY - this.startY; if (diff > 0) this.sheet.style.transform = `translateY(${diff}px)`; }
            endDrag() {
                if (!this.isDragging) return; this.isDragging = false;
                const currentTransform = this.sheet.style.transform;
                const diff = currentTransform ? parseInt(currentTransform.replace('translateY(', '').replace('px)', '')) : 0;
                if (diff > 100) this.hide(); else this.sheet.style.transform = '';
            }
        }

        // ================== FILTERS & UI ==================
        let giFilterState = 'gi', currentCategoryFilter = null, currentRule = 'none', styleFilterActive = false;
        let styleProfile = JSON.parse(localStorage.getItem('bjj_style_profile') || '{}');

        function applyAllFilters() {
            nodes.forEach(n => nodes.update({ id: n.id, hidden: true }));
            nodes.forEach(n => {
                if (currentCategoryFilter !== null && n.group !== currentCategoryFilter) return;
                if ((giFilterState === 'gi' && !n.gi) || (giFilterState === 'nogi' && !n.noGi)) return;
                let passRule = true;
                if (currentRule === 'ibjjf_gi') passRule = n.legal_ibjjf_gi;
                else if (currentRule === 'ibjjf_nogi') passRule = n.legal_ibjjf_nogi;
                else if (currentRule === 'adcc') passRule = n.legal_adcc;
                
                if (!passRule) { nodes.update({ id: n.id, hidden: false, opacity: 0.3 }); return; }
                nodes.update({ id: n.id, hidden: false, opacity: 1.0 });
            });
            if (styleFilterActive && Object.keys(styleProfile).length > 0) {
                nodes.forEach(n => {
                    if (n.hidden) return;
                    const matches = (n.tags || []).some(tag => styleProfile[tag]);
                    nodes.update({ id: n.id, borderWidth: matches ? 3 : 1, borderColor: matches ? '#f59e0b' : undefined });
                });
            } else {
                nodes.forEach(n => nodes.update({ id: n.id, borderWidth: 1, borderColor: undefined }));
            }
            edges.forEach(e => {
                const from = nodes.get(e.from), to = nodes.get(e.to);
                if (from && to) edges.update({ id: e.id, hidden: from.hidden || to.hidden });
            });
        }

                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    currentCategoryFilter = null;
                } else {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active'); currentCategoryFilter = val;
                }
                applyAllFilters(); triggerHaptic('light');
            });
        });

        // ================== DETAILS & SHARE ==================
        function renderNodeDetails(nodeId) {
            const n = bjjNodesData.find(x => x.id === nodeId);
            if (!n) return;
            const status = progress[nodeId] || 'not_started';
            const catLabels = { position:'Позиция', submission:'Сабмишен', sweep:'Свип', guard_pass:'Проход', transition:'Переход', escape:'Защита', takedown:'Тейкдаун' };
            const beltIcons = { white:'⚪', blue:'🔵', purple:'🟣', brown:'🟤', black:'⚫' };
            
            let badges = [];
            if (n.gi) badges.push('<span class="px-2 py-0.5 bg-indigo-50 text-indigo-600 rounded text-xs border border-indigo-200">🥋 Gi</span>');
            if (n.noGi) badges.push('<span class="px-2 py-0.5 bg-cyan-50 text-cyan-600 rounded text-xs border border-cyan-200">🩳 No‑Gi</span>');
            
            let legal = [];
            legal.push(n.legal_ibjjf_gi ? '✅ IBJJF Gi' : '🚫 IBJJF Gi');
            legal.push(n.legal_ibjjf_nogi ? '✅ IBJJF No‑Gi' : '🚫 IBJJF No‑Gi');
            legal.push(n.legal_adcc ? '✅ ADCC' : '🚫 ADCC');
            
            let tags = [];
            if (n.tags.includes('flexibility')) tags.push('🧘');
            if (n.tags.includes('pressure')) tags.push('🦍');
            if (n.tags.includes('long_limbs')) tags.push('🕷️');
            if (n.tags.includes('speed')) tags.push('⚡');

            const linked = bjjEdgesData.filter(e => e.from === nodeId || e.to === nodeId);
            const triggers = {}, noTrigger = [];
            linked.forEach(e => {
                const relId = e.from === nodeId ? e.to : e.from;
                const relNode = bjjNodesData.find(x => x.id === relId);
                const dir = e.from === nodeId ? '→' : '←';
                if (e.trigger) { if (!triggers[e.trigger]) triggers[e.trigger] = []; triggers[e.trigger].push({ id: relId, label: relNode ? relNode.label : relId, dir }); }

            for (const [trig, items] of Object.entries(triggers)) {
                linkedHtml += `<div class="mb-2"><span class="text-xs font-semibold text-slate-500">${trig}</span>`;

                noTrigger.forEach(i => { linkedHtml += `<button onclick="focusNode(${i.id})" class="flex items-center gap-2 w-full text-left px-3 py-1.5 bg-slate-50 hover:bg-slate-100 rounded-lg transition text-sm border border-slate-100 mt-1"><span class="text-slate-400">${i.dir}</span><span class="font-medium text-slate-700">${i.label}</span></button>`; });

                        </button>

                        <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Прогресс</h3>

                            <button onclick="updateProgress(${nodeId}, 'in_progress')" class="progress-btn ${status==='in_progress'?'active-progress':'bg-slate-50 text-slate-500 border border-slate-200'} py-2 rounded-lg text-xs font-medium">В процессе</button>
                            <button onclick="updateProgress(${nodeId}, 'done')" class="progress-btn ${status==='done'?'active-done':'bg-slate-50 text-slate-500 border border-slate-200'} py-2 rounded-lg text-xs font-medium">Изучено</button>

                </div>`;

        window.updateProgress = (id, status) => { setProgress(id, status); renderNodeDetails(id); };

                searchResults.innerHTML = matches.map(n => `
                    <div onclick="focusNode(${n.id}); searchInput.value=''; searchResults.classList.add('hidden')"
                         class="px-4 py-3 hover:bg-slate-50 cursor-pointer border-b border-slate-100 last:border-0 flex items-center gap-3 transition">
                        <span class="text-lg">${groupIcons[n.group] || '🥋'}</span>
                        <div>
                            <div class="font-medium text-sm text-slate-800">${n.label}</div>
                            <div class="text-xs text-slate-500">${n.title}</div>
                        </div>
                    </div>
                `).join('');
                searchResults.classList.remove('hidden');
            } else {
                searchResults.innerHTML = '<div class="px-4 py-3 text-sm text-slate-500">Ничего не найдено</div>';
                searchResults.classList.remove('hidden');
            }
        });

        // Закрыть поиск при клике вне
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.relative')) {
                searchResults.classList.add('hidden');
            }
        });

        network.on('click', function(params) { 
            if (params.nodes.length) renderNodeDetails(params.nodes[0]);
        });

        // ================== DARK MODE ==================
        window.toggleDarkMode = () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('bjj_dark_mode', isDark);
            document.getElementById('themeToggle').textContent = isDark ? '☀️' : '🌙';
        };
        if (localStorage.getItem('bjj_dark_mode') === 'true') {
            document.body.classList.add('dark');
            document.getElementById('themeToggle').textContent = '☀️';
        }

        // ================== INFO MODAL ==================
        const modalContent = {
            0: `<h2 class="text-lg font-bold text-slate-800 mb-3">О карте BJJ Map</h2>
                <p class="text-slate-600 mb-3">Это интерактивная карта техник бразильского джиу-джитсу, построенная в виде графа. Она помогает видеть не просто отдельные приемы, а связи между позициями, переходами и атаками.</p>
                <p class="text-slate-600"><strong>Ключевые особенности:</strong><br>
                • Учет правил (IBJJF Gi/No-Gi, ADCC)<br>
                • Персонализация под ваш стиль и телосложение<br>
                • Отслеживание прогресса обучения<br>
                • Триггеры: подсказки, при каких действиях соперника срабатывает переход.</p>`,
            1: `<h2 class="text-lg font-bold text-slate-800 mb-3">Как пользоваться</h2>
                <ol class="list-decimal pl-5 text-slate-600 space-y-3">
                    <li><strong>Навигация:</strong> Перетаскивайте граф пальцем или мышкой. Используйте два пальца для зума. Двойной тап по узлу приближает его.</li>
                    <li><strong>Фильтры:</strong> Выберите правила соревнований сверху. Нажмите "Gi / No-Gi" для переключения режима.</li>
                    <li><strong>Ваш стиль:</strong> Нажмите "🧑‍🎤 Стиль", отметьте свои сильные стороны. Затем нажмите фильтр "⭐ Мой стиль", чтобы подсветить рекомендуемые техники.</li>
                    <li><strong>Прогресс:</strong> Нажмите на <strong>процент</strong> вверху, чтобы увидеть список изученных техник. В карточке техники отмечайте статус: "Не начал", "В процессе", "Изучено".</li>
                    <li><strong>Поиск:</strong> Начните вводить название, и появится выпадающий список всех подходящих техник. Нажмите на нужную, чтобы перейти к ней.</li>
                    <li><strong>Поделиться:</strong> В карточке каждой техники есть кнопка "Поделиться", чтобы отправить ссылку партнеру по тренировкам.</li>
                </ol>`
        };
        
        window.openInfoModal = () => { document.getElementById('infoModal').classList.remove('hidden'); switchTab(0); };
        window.closeInfoModal = () => document.getElementById('infoModal').classList.add('hidden');
        
        window.switchTab = (idx) => {
            document.getElementById('modalContent').innerHTML = modalContent[idx];
            document.querySelectorAll('.tab-btn').forEach((b, i) => { 
                if (i === idx) {
                    b.classList.add('text-blue-600', 'border-b-2', 'border-blue-600');
                    b.classList.remove('text-slate-400');
                } else {
                    b.classList.remove('text-blue-600', 'border-b-2', 'border-blue-600');
                    b.classList.add('text-slate-400');
                }
            });
        };

        // ================== INIT ==================
        updateGlobalProgress();
        updateNodeColors();
        applyAllFilters();
        
        const urlParams = new URLSearchParams(window.location.search);
        const startNode = urlParams.get('node');
        if (startNode && bjjNodesData.find(n => n.id == startNode)) {
            setTimeout(() => focusNode(parseInt(startNode)), 500);
        }
    </script>
</body>
</html>
