<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Критически важно для мобильных: viewport-fit=cover для Safe Area -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>BJJ Map</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BJJ Map">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- Vis.js Network -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Верхняя панель управления -->
        <header class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Поиск техники...">
            </div>
            
            <!-- Горизонтальные чипсы для мобильных -->
            <div class="filter-chips" id="filterChips">
                <button class="chip active" data-filter="all">Все</button>
                <button class="chip" data-filter="position">Позиции</button>
                <button class="chip" data-filter="submission">Болевые</button>
                <button class="chip" data-filter="guard">Гард</button>
                <button class="chip" data-filter="pass">Проходы</button>
            </div>

            <div class="header-actions">
                <button class="icon-btn" id="themeToggle" title="Темная тема">🌙</button>
                <button class="icon-btn" id="shortcutsBtn" title="Горячие клавиши">⌨️</button>
            </div>
        </header>

        <!-- Контейнер графа -->
        <main id="mynetwork"></main>

        <!-- Индикатор обновления (Pull to refresh) -->
        <div class="pull-to-refresh" id="pullToRefresh">
            <div class="spinner"></div>
            <span>Обновление...</span>
        </div>
    </div>

    <!-- BOTTOM SHEET (Всплывающая панель снизу) -->
    <div class="bottom-sheet-overlay" id="bottomSheetOverlay"></div>
    <div class="bottom-sheet" id="bottomSheet">
        <div class="bottom-sheet-handle"></div>
        <div class="bottom-sheet-content" id="bottomSheetContent">
            <!-- Контент загружается через JS -->
        </div>
    </div>

    <!-- Контекстное меню (для long-press) -->
    <div class="context-menu" id="contextMenu" style="display: none;">
        <button id="ctxMarkDone">Отметить как изучено</button>
        <button id="ctxMarkLearning">Изучаю</button>
        <button id="ctxFocus">Сфокусировать</button>
    </div>

    <!-- Модальное окно горячих клавиш -->
    <div class="modal-overlay" id="shortcutsModal" style="display: none;">
        <div class="modal-content">
            <button class="modal-close" id="closeShortcuts">×</button>
            <h2>⌨️ Горячие клавиши</h2>
            <div class="shortcuts-grid">
                <div class="shortcut-item"><kbd>F</kbd> <span>Поиск</span></div>
                <div class="shortcut-item"><kbd>Esc</kbd> <span>Закрыть / Сброс</span></div>
                <div class="shortcut-item"><kbd>Ctrl+S</kbd> <span>Сохранить</span></div>
                <div class="shortcut-item"><kbd>D</kbd> <span>Темная тема</span></div>
                <div class="shortcut-item"><kbd>1/2/3</kbd> <span>Статус узла</span></div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
