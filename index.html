<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BJJ Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://visjs.github.io/vis-network/standalone/umd/vis-network.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f1f5f9; color: #1e293b; margin: 0; }
        #mynetwork { width: 100%; height: 60vh; min-height: 400px; background: white; border-radius: 16px; border: 1px solid #e2e8f0; }
        .node-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .filter-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
        .progress-btn { transition: all 0.2s; }
        .progress-btn.active-not { background: #e2e8f0; color: #475569; border: 1px solid #cbd5e1; }
        .progress-btn.active-progress { background: #fef3c7; color: #b45309; border: 1px solid #fcd34d; }
        .progress-btn.active-done { background: #d1fae5; color: #047857; border: 1px solid #6ee7b7; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="p-4 bg-white shadow-sm border-b border-slate-200 sticky top-0 z-50">
        <div class="flex items-center justify-between mb-3">
            <h1 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                <span class="text-2xl">🥋</span> BJJ Map
            </h1>
            <div class="flex items-center gap-2">
                <button onclick="openInfoModal()" class="w-8 h-8 bg-slate-100 hover:bg-slate-200 rounded-full flex items-center justify-center text-slate-500 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
                </button>
                <div class="text-xs font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-full" id="globalProgressText">
                    0%
                </div>
            </div>
        </div>
        <!-- Filters -->
        <div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar">
            <button class="filter-btn active whitespace-nowrap px-4 py-2 rounded-full bg-white border border-slate-300 text-slate-700 font-medium text-sm" data-filter="all">Все</button>
            <button class="filter-btn whitespace-nowrap px-4 py-2 rounded-full bg-white border border-slate-300 text-slate-700 font-medium text-sm" data-filter="position">Позиции</button>
            <button class="filter-btn whitespace-nowrap px-4 py-2 rounded-full bg-white border border-slate-300 text-slate-700 font-medium text-sm" data-filter="transition">Переходы</button>
            <button class="filter-btn whitespace-nowrap px-4 py-2 rounded-full bg-white border border-slate-300 text-slate-700 font-medium text-sm" data-filter="submission">Сабмишены</button>
        </div>
        <!-- Progress bar -->
        <div class="w-full h-1.5 bg-slate-200 rounded-full mt-3 overflow-hidden">
            <div id="progressBar" class="h-full bg-emerald-500 rounded-full transition-all duration-500" style="width: 0%;"></div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 p-4 flex flex-col gap-4">
        <!-- Graph Area -->
        <div class="relative">
            <div id="mynetwork"></div>
            <div class="absolute bottom-3 right-3 flex flex-col gap-2">
                <button onclick="fitGraph()" class="w-10 h-10 bg-white border border-slate-200 rounded-full flex items-center justify-center text-slate-600 shadow-sm active:scale-95 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
                </button>
            </div>
        </div>

        <!-- Node Details Card -->
        <div id="nodeDetails" class="bg-white rounded-2xl p-5 node-card shadow-md border border-slate-200">
            <div class="text-center py-4 text-slate-400">
                <svg class="w-10 h-10 mx-auto mb-2 opacity-50" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122" />
                </svg>
                <p class="text-sm">Нажмите на любой узел графа,<br>чтобы увидеть детали и отметить прогресс</p>
            </div>
        </div>
    </main>

    <!-- Info Modal -->
    <div id="infoModal" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
        <div class="bg-white border border-slate-200 rounded-2xl w-11/12 max-w-md max-h-[80vh] flex flex-col overflow-hidden shadow-xl">
            <div class="flex border-b border-slate-200">
                <button class="tab-btn flex-1 py-3 text-sm font-semibold text-slate-400 hover:text-slate-600" data-tab="0">О карте</button>
                <button class="tab-btn flex-1 py-3 text-sm font-semibold text-slate-400 hover:text-slate-600" data-tab="1">Как пользоваться</button>
                <button class="tab-btn flex-1 py-3 text-sm font-semibold text-slate-400 hover:text-slate-600" data-tab="2">Обозначения</button>
            </div>
            <div class="overflow-y-auto p-5 text-sm text-slate-700 space-y-4" id="modalContent"></div>
            <button onclick="closeInfoModal()" class="m-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-xl text-slate-700 font-medium transition">Закрыть</button>
        </div>
    </div>

    <script>
        // Telegram Web App
        if (window.Telegram && window.Telegram.WebApp) {

        const getProgress = () => JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

            const progress = getProgress();
            progress[nodeId] = status;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
            updateGlobalProgress();
            updateNodeColors();

        // Vis.js init
        const nodes = new vis.DataSet(bjjNodesData.map(n => ({ id: n.id, label: n.label, group: n.group, title: n.title, desc: n.desc, belt: n.belt })));

        const container = document.getElementById('mynetwork');
        const network = new vis.Network(container, { nodes, edges }, {
            groups,
            edges: { arrows: { to: { enabled: true, scaleFactor: 0.8 } }, font: { size: 0 }, color: '#cbd5e1' },
            physics: { solver: 'forceAtlas2Based', forceAtlas2Based: { gravitationalConstant: -50 } },
            interaction: { hover: true }
        });

        // Update node colors based on progress
        function updateNodeColors() {
            const progress = getProgress();
            const learnedSet = new Set(Object.keys(progress).filter(id => progress[id] === 'done'));
            const availableSet = new Set();
            edges.forEach(edge => {
                if (learnedSet.has(edge.from) && !learnedSet.has(edge.to)) availableSet.add(edge.to);
                if (learnedSet.has(edge.to) && !learnedSet.has(edge.from)) availableSet.add(edge.from);
            });
            nodes.forEach(node => {
                const status = progress[node.id] || 'not_started';
                let color;
                if (status === 'done') color = { background: '#4CAF50', border: '#2E7D32' };
                else if (status === 'in_progress') color = { background: '#f59e0b', border: '#d97706' };
                else if (availableSet.has(node.id)) color = { background: '#FFC107', border: '#FF9800' };
                else {
                    const orig = groups[node.group]?.color?.background || '#ccc';
                    color = { background: orig, opacity: 0.6 };
                }
                nodes.update({ id: node.id, color });
            });
        }

        // Global progress
        function updateGlobalProgress() {
            const progress = getProgress();
            const total = bjjNodesData.length;
            const done = Object.values(progress).filter(v => v === 'done').length;
            const percent = Math.round((done / total) * 100);
            document.getElementById('globalProgressText').textContent = `${percent}%`;
            document.getElementById('progressBar').style.width = `${percent}%`;
        }

        // Node detail card
        function renderNodeDetails(nodeId) {
            const nodeData = bjjNodesData.find(n => n.id === nodeId);
            if (!nodeData) return;
            const progress = getProgress();
            const currentStatus = progress[nodeId] || 'not_started';
            const categoryLabels = { position:'Позиция', submission:'Сабмишен', sweep:'Свип', guard_pass:'Проход', transition:'Переход', escape:'Защита', takedown:'Тейкдаун' };
            const beltIcons = { white:'⚪', blue:'🔵', purple:'🟣', brown:'🟤', black:'⚫' };
            const linkedEdges = bjjEdgesData.filter(e => e.from === nodeId || e.to === nodeId);
            const linkedHtml = linkedEdges.map(e => {
                const relatedId = e.from === nodeId ? e.to : e.from;
                const relatedNode = bjjNodesData.find(n => n.id === relatedId);
                const direction = e.from === nodeId ? '→' : '←';
                return `<button onclick="focusNode(${relatedId})" class="flex items-center gap-2 w-full text-left px-3 py-2 bg-slate-50 hover:bg-slate-100 rounded-lg transition text-sm border border-slate-100">
                    <span class="text-slate-400">${direction}</span>
                    <span class="font-medium text-slate-700">${relatedNode ? relatedNode.label : relatedId}</span>
                </button>`;
            }).join('');
            document.getElementById('nodeDetails').innerHTML = `
                <div class="fade-in">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <h2 class="text-lg font-bold text-slate-800 mb-1">${nodeData.title}</h2>
                            <div class="flex gap-2 flex-wrap">
                                <span class="px-2 py-0.5 bg-slate-100 rounded text-xs text-slate-600 border border-slate-200">${categoryLabels[nodeData.group]}</span>

                        </div>

                            <button onclick="updateProgress(${nodeId}, 'in_progress')" class="progress-btn ${currentStatus==='in_progress'?'active-progress':'bg-slate-50 text-slate-500 border border-slate-200'} py-2 rounded-lg text-xs font-medium">В процессе</button>
                            <button onclick="updateProgress(${nodeId}, 'done')" class="progress-btn ${currentStatus==='done'?'active-done':'bg-slate-50 text-slate-500 border border-slate-200'} py-2 rounded-lg text-xs font-medium">Изучено</button>

                    nodes.forEach(n => nodes.update({ id: n.id, hidden: false }));

                    nodes.forEach(n => {
                        const hidden = n.group !== filter;
                        nodes.update({ id: n.id, hidden });
                    });

                    const fromNode = nodes.get(e.from);
                    const toNode = nodes.get(e.to);
                    if (fromNode && toNode) {
                        edges.update({ id: e.id, hidden: fromNode.hidden || toNode.hidden });
